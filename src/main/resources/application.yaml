#######################
# Server Configuration
#######################
server:
  port: ${SIAMOIS_PORT:8099}
  forward-headers-strategy: native
  servlet:
    context-path: ${CONTEXT_PATH:/siamois}
    session:
      timeout: 125m
  error:
    path: /error/500
    whitelabel:
      enabled: false

siamois:
  lang:
    default: ${DEFAULT_LANG:fr}
    available: en, fr
  admin:
    username: ${SIAMOIS_ADMIN_LOGIN}
    password: ${SIAMOIS_ADMIN_PASSWORD}
    email: ${SIAMOIS_ADMIN_EMAIL}
  documents:
    folder-path: ${SIAMOIS_DOCUMENTS_PATH}
    allowed-types: image/jpeg, image/png, image/svg+xml, image/tiff, image/webp, image/apng, application/pdf
  jwt:
    # HS256 : au moins 256 bits — utiliser une valeur forte en prod (variable SIAMOIS_JWT_SECRET).
    secret: ${SIAMOIS_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
    access-token-validity: PT15M


spring:
  thymeleaf:
    check-template-location: false
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 1000
      minimum-idle: 1
      idle-timeout: 30000
      connection-test-query: SELECT 1
  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: false
        # Regroupe le chargement des associations LAZY (collections et proxies du même type)
        # en quelques requêtes "IN (...)" au lieu d'un N+1. Améliore fortement l'affichage des
        # fiches qui naviguent parents/enfants/phases/relations via le mappeur.
        default_batch_fetch_size: 32
        envers:
          audit_table_suffix: _AUD
          store_data_at_delete: true
          global_with_modified_flag: true

  liquibase:
    enabled: true
    change-log: classpath:/changelog/db.changelog.xml

  messages:
    basename: language/messages
    encoding: UTF-8
    fallback-to-system-locale: false

  web:
    resources:
      static-locations: classpath:/static/

  servlet:
    multipart:
      enabled: true
      max-file-size: 300MB
      max-request-size: 300MB

  cache:
    caffeine:
      spec: expireAfterAccess=1h,maximumSize=500

joinfaces:
  faces:
    project-stage: production
  primefaces:
    theme: overcast

logging:
  level:
    root: INFO
    org:
      springframework: INFO
      hibernate:
        SQL: INFO

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true
  default-produces-media-type: application/json
