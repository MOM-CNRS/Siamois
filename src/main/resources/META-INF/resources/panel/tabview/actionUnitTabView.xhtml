<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:f="http://xmlns.jcp.org/jsf/core"
             xmlns:c="http://java.sun.com/jsp/jstl/core" xmlns:h="http://java.sun.com/jsf/html"
>

    <!--@elvariable id="panelModel" type="fr.siamois.ui.bean.panel.models.panel.single.ActionUnitPanel"-->
    <!--@elvariable id="panelIndex" type="Integer"-->

    <!-- RemoteCommands outside the TabView NamingContainer — tab facet components cannot fire JSF actions directly -->
    <p:remoteCommand name="addRecordingUnitTabCmd#{panelModel.unitId}"
                     action="#{panelModel.addRecordingUnitTab()}"
                     process="@this"
                     update=":singlePanelUnitForm-#{panelIndex}:singlePanelUnitTabs"
                     onstart="showProgressBar(PF('pbBarAjax_#{panelIndex}'), 'var(--main-color)');"
                     oncomplete="hideProgressBar(PF('pbBarAjax_#{panelIndex}'));"/>
    <p:remoteCommand name="addSpecimenTabCmd#{panelModel.unitId}"
                     action="#{panelModel.addSpecimenTab()}"
                     process="@this"
                     update=":singlePanelUnitForm-#{panelIndex}:singlePanelUnitTabs"
                     onstart="showProgressBar(PF('pbBarAjax_#{panelIndex}'), 'var(--main-color)');"
                     oncomplete="hideProgressBar(PF('pbBarAjax_#{panelIndex}'));"/>
    <p:remoteCommand name="addSpatialContextTabCmd#{panelModel.unitId}"
                     action="#{panelModel.addSpatialContextTab()}"
                     process="@this"
                     update=":singlePanelUnitForm-#{panelIndex}:singlePanelUnitTabs"
                     onstart="showProgressBar(PF('pbBarAjax_#{panelIndex}'), 'var(--main-color)');"
                     oncomplete="hideProgressBar(PF('pbBarAjax_#{panelIndex}'));"/>
    <p:remoteCommand name="removeTabCmd#{panelModel.unitId}"
                     action="#{panelModel.removeTabByIdFromParam()}"
                     process="@this"
                     update=":singlePanelUnitForm-#{panelIndex}:singlePanelUnitTabs"/>
    <p:remoteCommand name="renameTabCmd#{panelModel.unitId}"
                     action="#{panelModel.renameTabFromParam()}"
                     process="@this"
                     update=":singlePanelUnitForm-#{panelIndex}:singlePanelUnitTabs"/>

    <!-- Tabs -->
    <p:tabView id="singlePanelUnitTabs" activeIndex="#{panelModel.activeTabIndex}" dynamic="true"
               styleClass="action-unit-tabview">

        <f:facet name="actions">
            <p:splitButton value="#{langBean.msg('panel.tab.add')}"
                           icon="bi bi-plus-lg"
                           type="button"
                           onclick="addRecordingUnitTabCmd#{panelModel.unitId}();">
                <p:menuitem value="#{langBean.msg('common.entity.recordingUnits')}"
                            icon="bi bi-pencil-square"
                            onclick="addRecordingUnitTabCmd#{panelModel.unitId}(); return false;"/>
                <p:menuitem value="#{langBean.msg('common.entity.specimen')}"
                            icon="bi bi-bucket"
                            onclick="addSpecimenTabCmd#{panelModel.unitId}(); return false;"/>
                <p:menuitem value="#{langBean.msg('common.entity.spatialUnits')}"
                            icon="bi bi-geo-alt"
                            onclick="addSpatialContextTabCmd#{panelModel.unitId}(); return false;"/>
            </p:splitButton>
        </f:facet>

        <p:ajax
                event="tabChange"
                listener="#{panelModel.onTabChange}"
                onstart="showProgressBar(PF('pbBarAjax_#{panelIndex}'), 'var(--main-color)');"
                oncomplete="hideProgressBar(PF('pbBarAjax_#{panelIndex}'));"
        />

            <!-- details tab -->
            <p:tab>

                <f:facet name="title">

                    <ui:include src="/pages/shared/tab/tabTitle.xhtml">
                        <ui:param name="title" value='#{langBean.msg(panelModel.tabs[0].titleCode)}'/>
                        <ui:param name="icon" value="#{panelModel.tabs[0].icon}"/>
                        <ui:param name="emptyTab" value="#{panelModel.emptyTabFor(panelModel.tabs[0])}"/>
                        <ui:param name="validated" value="#{panelModel.unit.validated}"/>
                    </ui:include>
                </f:facet>

                <ui:include src="#{panelModel.tabs[0].getViewName()}">
                    <ui:param name="panelModel" value="#{panelModel}"/>
                    <ui:param name="panelIndex" value="#{panelIndex}"/>
                    <ui:param name="tabModel" value="#{panelModel.tabs[0]}"/>
                    <ui:param name="root"
                              value="singlePanelUnitForm-#{panelIndex}:singlePanelUnitTabs:#{panelModel.getIndexOfTab(panelModel.tabs[0])}"/>
                </ui:include>

            </p:tab>

        <!-- document tab -->
        <p:tab>

            <f:facet name="title">

                <ui:include src="/pages/shared/tab/tabTitle.xhtml">
                    <ui:param name="title" value='#{langBean.msg(panelModel.tabs[1].titleCode)}'/>
                    <ui:param name="icon" value="#{panelModel.tabs[1].icon}"/>
                    <ui:param name="emptyTab" value="#{panelModel.emptyTabFor(panelModel.tabs[1])}"/>
                    <ui:param name="validated" value="#{panelModel.unit.validated}"/>
                    <ui:param name="count" value="#{panelModel.documents.size()}"/>
                </ui:include>
            </f:facet>

            <ui:include src="#{panelModel.tabs[1].getViewName()}">
                <ui:param name="panelModel" value="#{panelModel}"/>
                <ui:param name="panelIndex" value="#{panelIndex}"/>
                <ui:param name="tabModel" value="#{panelModel.tabs[1]}"/>
            </ui:include>

        </p:tab>

        <!-- rec unit-->
        <p:tab>

            <f:facet name="title">

                <ui:include src="/pages/shared/tab/tabTitle.xhtml">
                    <ui:param name="title" value='#{langBean.msg(panelModel.tabs[2].titleCode)}'/>
                    <ui:param name="icon" value="#{panelModel.tabs[2].icon}"/>
                    <ui:param name="emptyTab" value="#{panelModel.emptyTabFor(panelModel.tabs[2])}"/>
                    <ui:param name="validated" value="#{panelModel.unit.validated}"/>
                    <ui:param name="count" value="#{panelModel.unit.recordingUnitCount}"/>
                </ui:include>
            </f:facet>

            <ui:include src="#{panelModel.tabs[2].getViewName()}">
                <ui:param name="panelModel" value="#{panelModel}"/>
                <ui:param name="panelIndex" value="#{panelIndex}"/>
                <ui:param name="tabModel" value="#{panelModel.tabs[2]}"/>
            </ui:include>

        </p:tab>

        <!-- Settings-->
        <p:tab rendered="false">

            <f:facet name="title">

                <ui:include src="/pages/shared/tab/tabTitle.xhtml">
                    <ui:param name="title" value='#{langBean.msg(panelModel.tabs[3].titleCode)}'/>
                    <ui:param name="icon" value="#{panelModel.tabs[3].icon}"/>
                    <ui:param name="emptyTab" value="#{panelModel.emptyTabFor(panelModel.tabs[3])}"/>
                    <ui:param name="validated" value="#{panelModel.unit.validated}"/>
                </ui:include>
            </f:facet>

            <ui:include src="#{panelModel.tabs[3].getViewName()}">
                <ui:param name="panelModel" value="#{panelModel}"/>
                <ui:param name="panelIndex" value="#{panelIndex}"/>
                <ui:param name="tabModel" value="#{panelModel.tabs[3]}"/>
            </ui:include>

        </p:tab>

        <!-- Dynamic tabs (added at runtime) -->
        <c:forEach items="#{panelModel.tabs}" var="extraTab" begin="4">
            <p:tab>
                <f:facet name="title">
                    <ui:include src="/pages/shared/tab/dynamicTabTitle.xhtml">
                        <ui:param name="tab"        value="#{extraTab}"/>
                        <ui:param name="panelModel" value="#{panelModel}"/>
                        <ui:param name="panelIndex" value="#{panelIndex}"/>
                    </ui:include>
                </f:facet>
                <ui:include src="#{extraTab.getViewName()}">
                    <ui:param name="panelModel" value="#{panelModel}"/>
                    <ui:param name="panelIndex" value="#{panelIndex}"/>
                    <ui:param name="tabModel"   value="#{extraTab}"/>
                    <ui:param name="tableId"    value="recordingList_#{extraTab.id}"/>
                </ui:include>
            </p:tab>
        </c:forEach>

    </p:tabView>


</ui:fragment>
