<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:p="http://primefaces.org/ui"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<ui:composition>
    <h:form id="validationButtonForm">
        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>

        <p:commandButton
                action="#{panelModel.toggleValidate()}"
                update="@this"
                process="@this"
                icon="#{panelModel.unit.validated ? 'pi pi-check' : 'pi pi-times'}"
                styleClass="rounded-button ui-button-flat #{panelModel.unit.validated ? 'status-button validated' : 'status-button not-validated'}"
                onclick="event.stopPropagation();"
        />
    </h:form>
</ui:composition>
</html>
