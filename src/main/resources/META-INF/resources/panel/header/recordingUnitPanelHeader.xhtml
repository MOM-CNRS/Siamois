<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:chip="http://xmlns.jcp.org/jsf/composite/pages/shared/chip" xmlns:h="http://java.sun.com/jsf/html"
             xmlns:c="http://java.sun.com/jsp/jstl/core"
>
    <!--@elvariable id="panelModel" type="fr.siamois.ui.bean.panel.models.panel.single.RecordingUnitPanel"-->


        <c:if test="#{panelModel.hasPreviousNext()}">
            <ui:include src="/panel/header/validationButton.xhtml">
                <ui:param name="disabled" value="false"/>
                <ui:param name="unit" value="#{panelModel.unit}"/>
                <ui:param name="panelModel" value="#{panelModel}"/>
            </ui:include>
        </c:if>
        <div style="display: flex;">

            <p:commandLink id="previous"
                           process="@this"
                           rendered="#{panelModel.hasPreviousNext()}"
                           action="#{panelModel.goToPrevious()}"
                           styleClass="sideview-topbar-button">
                <h:outputText styleClass='ui-icon bi bi-caret-up' style="color: var(--main-color)"/>
            </p:commandLink>
            <p:tooltip
                    autoHide="false" value="Fiche précédente"
                    position="bottom"
                    for="previous"
            />
            <p:commandLink id="next"
                           process="@this"
                           rendered="#{panelModel.hasPreviousNext()}"
                           action="#{panelModel.goToNext()}"
                           styleClass="sideview-topbar-button">
                <h:outputText styleClass='ui-icon bi bi-caret-down' style="color: var(--main-color)"/>
            </p:commandLink>
            <p:tooltip
                    autoHide="false" value="Fiche suivante"
                    position="bottom"
                    for="next"
            />

        </div>


    <p:chip label="#{panelModel.titleCodeOrTitle}"
            icon="#{panelModel.icon}"
            id="idChip"
            styleClass="mr-2 recording-unit-chip-alt"
    />
    <h:form id="contextMenuForm" styleClass="sia-settings-form">
        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
        <p:contextMenu for="idChip">
            <p:menuitem value="Ouvrir dans l'aperçu lateral" icon="bi bi-layout-sidebar-inset-reverse"
                        action="#{flowBean.addRecordingUnitToOverview(
                    panelModel.unit.id,
                    panelModel,
                    1
            )}"
            />
        </p:contextMenu>
    </h:form>

    <chip:conceptChip concept="#{panelModel.unit.type}" styleClass="mr-2 recording-unit-type-chip"/>


    <p:chip rendered="#{panelModel.hasUnsavedModifications}" label="Modifications non enregistré"
            styleClass="mr-2 error-chip"
    />

    <div id="spinner" style="display:none;" class="spinner-border">
        <output class="visually-hidden">Loading...</output>
    </div>

</ui:fragment>
