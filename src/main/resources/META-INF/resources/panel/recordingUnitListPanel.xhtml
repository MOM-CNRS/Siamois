<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:table="http://xmlns.jcp.org/jsf/composite/pages/shared/table"
             xmlns:h="http://java.sun.com/jsf/html"

>

    <h:form id="recordingUnitListForm"

    >
        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>

        <div
                style="padding:1em;  margin-left: auto;
  width: fit-content;">La création d'UE n'est disponible que depuis
            <p:commandLink
                    action="#{navBean.goToActionUnitList('FOCUS')}"
                    styleClass="action-unit"
                    value="un projet"
                    ajax="false"/>
        </div>

        <table:entityTable
                tableModel="#{panelModel.tableModel}"
                panelIndex="#{panelIndex}"
                id="recordingUnitList"
        >
        </table:entityTable>
    </h:form>


</ui:fragment>
