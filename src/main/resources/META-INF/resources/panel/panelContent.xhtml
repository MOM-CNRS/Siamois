<!-- panelTemplate.xhtml -->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:h="http://xmlns.jcp.org/jsf/html">

    <!--@elvariable id="panelIndex" type="String"-->
    <!--@elvariable id="mode" type="String"-->
    <!--@elvariable id="panelModel" type="fr.siamois.ui.bean.panel.models.panel.AbstractPanel"-->

    <p:staticMessage severity="error" summary="Error" closable="false"
                     detail="#{panelModel.errorMessage}"
                     rendered="#{not empty panelModel.errorMessage}"/>
    <p:progressBar widgetVar="pbBarAjax_#{panelIndex}" id="progressBar"
                   class="panel-progressbar"
                   style="height:3px" mode="indeterminate"/>

    <p:splitter id="panel-splitter-${panelIndex}" style="height: 100%;border:none;"
                styleClass="#{flowBean.fullscreenPanelIndex !=-1 ? 'focus' : ''}">
        <!-- Left Splitter Panel (dynamic) -->
        <p:splitterPanel style="overflow:auto;" styleClass="panel-splitter-panel-l" id="mainView">
            <!-- Include the reusable dynamic content for the right panel -->
            <ui:include src="#{panelModel.display()}" id="panel-body">
                <ui:param name="panelModel" value="#{panelModel}"/>
                <ui:param name="panelIndex" value="#{panelIndex}"/>
                <ui:param name="mode" value="#{mode}"/>
            </ui:include>
        </p:splitterPanel>

        <!-- Right Splitter Panel (dynamic) -->
        <p:splitterPanel styleClass="panel-splitter-panel-r"
                         style="overflow:auto;display: #{panelModel.getLeftSpltterSize()}"
                         id="overview">
            <p:outputPanel  id="sideview-${panelIndex}" styleClass="sideview #{panelModel.parentOrOverview.panelClass}"
                           style="border-radius: 1em 0 0 0;">
                <h:panelGroup rendered="#{not empty panelModel.parentOrOverview}">
                    <div  class="sideview-titlebar" style="
                            background: var(--siamois-green-light-100);
                            display: flex;
                            flex-direction: column;
                            flex-wrap: wrap;
                            column-gap: 2em;
                            row-gap: 0.5em;">

                        <h:form style="
                            width: fit-content;" id="actionForm-${panelModel.prefixPanelIndex}-overview">
                                                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                                                    <div style="display:flex;flex-direction: row;gap:0.5em;padding: 3px;
                                                            border: 1px solid var(--siamois-green-light);
                                                            border-radius: 15px;">

                                                        <p:commandLink styleClass="sideview-topbar-button"
                                                                       id="closeSideview"
                                                                       action="#{panelModel.closeOverview()}">
                                                            <h:outputText styleClass="bi bi-chevron-double-right"/>
                                                        </p:commandLink>
                                                        <p:tooltip
                                                                autoHide="false" value="Fermer l'aperçu latéral"
                                                                position="bottom"
                                                                for="closeSideview"
                                                        />
                                                        <p:commandLink styleClass="sideview-topbar-button"
                                                                       action="#{flowBean.fullScreen(panelModel.parentOrOverview)}"
                                                                       ajax="false"
                                                                       id="focusButton">
                                                            <h:outputText styleClass="bi bi-arrows-angle-expand"/>
                                                        </p:commandLink>
                                                        <p:tooltip
                                                                autoHide="false" value="Ouvrir en mode focus"
                                                                position="bottom"
                                                                for="focusButton"
                                                        />
                                                        <p:commandLink id="bookmarkToggleButton"
                                                                       process="@this"
                                                                       styleClass="sideview-topbar-button"
                                                                       action="#{navBean.togglePanelBookmark(panelModel.parentOrOverview)}"
                                                                       update="navBarCsrfForm:siamoisNavForm">
                                                            <h:outputText styleClass="#{navBean.isPanelBookmarkedByUser(panelModel.parentOrOverview) ?
                                                    'ui-icon bi bi-bookmark-fill' : 'ui-icon bi bi-bookmark'}"/>
                                                        </p:commandLink>

                                                        <p:commandLink id="refreshPanelButton"
                                                                       process="@this"
                                                                       styleClass="sideview-topbar-button"
                                                                       action="#{panelModel.parentOrOverview.refresh()}"
                                                                       onclick="event.stopPropagation();"
                                                                       update="sideview-${panelIndex}">
                                                            <h:outputText styleClass="bi bi-arrow-clockwise"/>
                                                        </p:commandLink>

                                                        <p:commandLink id="previous"
                                                                       process="@this"
                                                                       rendered="#{panelModel.parentOrOverview.hasPreviousNext()}"
                                                                       action="#{panelModel.parentOrOverview.goToPrevious()}"
                                                                       styleClass="sideview-topbar-button">
                                                            <h:outputText styleClass='ui-icon bi bi-caret-up'/>
                                                        </p:commandLink>
                                                        <p:tooltip
                                                                autoHide="false" value="Fiche précédente"
                                                                position="bottom"
                                                                for="previous"
                                                        />
                                                        <p:commandLink id="next"
                                                                       process="@this"
                                                                       rendered="#{panelModel.parentOrOverview.hasPreviousNext()}"
                                                                       action="#{panelModel.parentOrOverview.goToNext()}"
                                                                       styleClass="sideview-topbar-button">
                                                            <h:outputText styleClass='ui-icon bi bi-caret-down'/>
                                                        </p:commandLink>
                                                        <p:tooltip
                                                                autoHide="false" value="Fiche suivante"
                                                                position="bottom"
                                                                for="next"
                                                        />
                                                    </div>
                                                </h:form>
                        <div style="display: flex;
                                    gap: 0.5em;
                                    align-items: center;
                                    flex-wrap: wrap;">
                            <ui:include rendered="#{panelModel.parentOrOverview.displayHeader() != null}"
                                        src="#{panelModel.parentOrOverview.displayHeader()}">
                                <ui:param name="formSuffix" value="_overview"/>
                                <ui:param name="panelModel" value="#{panelModel.parentOrOverview}"/>
                            </ui:include>
                        </div>

                    </div>
                    <p:progressBar widgetVar="pbBarAjax_#{panelIndex}-overview" id="overviewProgressBar"
                                   class="panel-progressbar"
                                   style="height:3px" mode="indeterminate"/>
                    <!-- Include the reusable dynamic content for the right panel -->
                    <ui:include src="#{panelModel.parentOrOverview.display()}" id="overview-panel-body">
                        <ui:param name="panelModel" value="#{panelModel.parentOrOverview}"/>
                        <ui:param name="panelIndex" value="#{panelIndex}-overview"/>
                        <ui:param name="mode" value="#{mode}"/>
                    </ui:include>
                </h:panelGroup>
            </p:outputPanel>
        </p:splitterPanel>
    </p:splitter>

</ui:composition>
