<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:c="http://java.sun.com/jsp/jstl/core"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:form="http://java.sun.com/jsf/composite/pages/shared/form">

    <ui:define name="head">

        <title>
            Siamois - Flow
        </title>

        <script>


            function handleScrollToTop() {

                const container = document.getElementById("content");
                if (container) {
                    container.firstElementChild.scrollIntoView({behavior: 'smooth', block: 'start'});
                }

            }

            function setFormHasBeenModified(element) {
                // Mark the form as modified and activate buttons
                console.log(element)

                element = (typeof element.closest === 'function') ? element : document.getElementById(element.id);

                let inputEl;
                // If not input, find first input to add border
                if (element.tagName !== 'INPUT') {
                    inputEl = element.querySelector('input');

                } else {
                    inputEl = element;
                }

                if (inputEl) {
                    $(inputEl).addClass('sia-modified-field');
                }

                const form = element.closest('form');
                const parent = form.parentElement;
                const hiddenField = form.querySelector('input[id$="spatialUnitForm:hasUnsavedModifications"]')
                if (hiddenField) {
                    hiddenField.value = 'true';
                    form.classList.add('form-modified'); // Feedback visuel optionnel
                }

                // if(parent) {
                //     const saveAsDraftButton = parent.querySelector('button[id$="spatialUnitForm:saveButton"], input[id$="spatialUnitForm:saveButton"]');
                //     const saveAndValidateButton = parent.querySelector('button[id$="spatialUnitForm:saveAndValidateButton"], input[id$="spatialUnitForm:saveAndValidateButton"]');
                //     const cancelModificationsButton = parent.querySelector('[id$="spatialUnitForm\\:cancelButton"]');
                //
                //     // Activate buttons
                //     if (saveAsDraftButton) {
                //         $(saveAsDraftButton).removeAttr("disabled");
                //         $(saveAsDraftButton).removeClass('ui-state-disabled');
                //     }
                //     if (saveAndValidateButton) {
                //         $(saveAndValidateButton).removeAttr("disabled");
                //         $(saveAndValidateButton).removeClass('ui-state-disabled');
                //     }
                //     if (cancelModificationsButton) {
                //         $(cancelModificationsButton).removeClass('ui-state-disabled');
                //     }
                //
                // }


            }
        </script>


    </ui:define>

    <ui:define name="metadata">
        <f:event type="preRenderView" listener="#{presentationBean.continueIfLogged()}"/>
    </ui:define>

    <ui:define name="content">

        <div style="display: flex; flex-direction: row; flex-shrink: 0">
            <div id="search-bar" class="hide-small-screen" style="flex:8">
                <form:csrfform formId="searchBarForm" id="searchBarCsrfForm">
                    <article>
                    <span class="ui-input-icon-right">
                        <p:inputText styleClass="searchInput" placeholder="" value="🚧" disabled="true"/>
                        <i class="bi bi-play-circle"/>
                    </span>
                    </article>
                </form:csrfform>
            </div>
            <div id="smallScreenToolbar" class="show-small-screen" style="align-content: center; flex:1;
            text-align:left; background: var(--siamois-green-light-100);padding: 0.5em">
                <form:csrfform formId="toggleButtonSidebarPanelForm" id="toggleButtonSidebarPanelCsrfForm">
                    <div style="display:flex;gap:1em;">
                        <p:commandButton icon="bi bi-list" onclick="toggleSiamoisSidebar()">

                        </p:commandButton>
                        <h:panelGroup styleClass="ui-inputgroup">
                            <h:panelGroup id="iconInstitSmallScreen" styleClass="ui-inputgroup-addon">
                                <i class="bi bi-buildings"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                    id="selectOneMenuInstitutionSmallScreen"
                                    value="#{flowBean.selectedInstitution}"
                                    filter="true"
                                    style="max-width: 10em; text-overflow: ellipsis"
                                    converter="#{institutionConverter}"
                                    filterMatchMode="startsWith"
                                    filterNormalize="true"
                                    var="inst"
                            >
                                <f:selectItems value="#{flowBean.institutions}"
                                               var="item"
                                               itemValue="#{item}"
                                               itemLabel="#{item.name}"
                                />

                                <p:column>
                                    <h:outputText value="#{inst.name}"/>
                                </p:column>

                                <p:ajax event="change"
                                        process="@this"
                                        listener="#{flowBean.onInstitutionChange}"
                                />
                            </p:selectOneMenu>
                        </h:panelGroup>
                    </div>

                </form:csrfform>
            </div>
            <div id="read-write-switch" style="align-content: center; flex:1;
            text-align:right; background: var(--siamois-green-light-100);padding: 0.5em; gap:0.5em; display: flex; flex-direction: row-reverse;">
                <h:form id="readWriteSwitchForm">
                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                    <p:selectBooleanButton id="readWriteSwitchButton" value="#{flowBean.isWriteMode}"
                                           offIcon="bi bi-eyeglasses" onIcon="bi bi-pen">
                        <p:ajax event="valueChange" listener="#{flowBean.changeReadWriteMode()}"
                                update="flow readWriteSwitchForm"
                                onstart="PF('buiContent').show()" oncomplete="PF('buiContent').hide()"/>
                    </p:selectBooleanButton>
                    <p:tooltip for="readWriteSwitchButton" value="#{flowBean.readWriteSwitchTooltip}"
                               position="bottom"/>
                </h:form>
                <h:form id="fieldDesktopSwitchForm">
                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                    <p:selectBooleanButton style="display:none;" value="#{flowBean.isFieldMode}"
                                           offIcon="bi bi-pc-display" onIcon="bi bi-phone" id="fieldOfficeSwitchButton">
                        <p:ajax event="valueChange" listener="#{flowBean.changeFieldOfficeMode()}"
                                update="flow fieldDesktopSwitchForm"
                                onstart="PF('buiContent').show()" oncomplete="PF('buiContent').hide()"/>
                    </p:selectBooleanButton>
                    <p:tooltip for="fieldOfficeSwitchButton" value="#{flowBean.fieldOfficeSwitchTooltip}"
                               position="bottom"/>
                </h:form>
                <ui:include src="/dialog/unsavedUpdates/unsavedUpdatesDialog.xhtml"/>
            </div>
        </div>

        <p:outputPanel style="display: flex; flex-direction: row; overflow-y: hidden;" id="flow" styleClass="#{flowBean.fullscreenPanelIndex !=-1 ? 'focus' : ''}">

            <p:outputPanel id="flowSummary" rendered="#{flowBean.fullscreenPanelIndex ==-1}">
                <h:form id="flowSummaryForm" >
                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>

                    <p:tabMenu id="panelTabMenu" class="panel-menu" orientation="left" activeIndex="-1">
                        <c:forEach items="#{flowBean.panels}" var="panel" varStatus="tabStatus">
                            <p:menuitem
                                    containerStyleClass="#{panel.panelTypeClass} menu-item"
                                    icon="#{panel.icon}"
                                    onclick="handleMenuItemClick('#panel-${panel.panelIndex}')"/>
                        </c:forEach>
                    </p:tabMenu>

                    <p:tabMenu id="panelTabMenuText" class="panel-menu-text" orientation="left" activeIndex="-1">
                        <c:forEach items="#{flowBean.panels}" var="panel" varStatus="tabStatus">
                            <p:menuitem
                                    containerStyleClass="#{panel.panelTypeClass} menu-item"
                                    value="#{panel.resolveTitleOrTitleCode()}"
                                    onclick="handleMenuItemClick('#panel-${panel.panelIndex}')"/>
                        </c:forEach>
                    </p:tabMenu>

                </h:form>
            </p:outputPanel>


            <p:outputPanel id="flowContent" styleClass="#{flowBean.getFlowContentStyleClass()}">
                <h:panelGroup
                        style="#{flowBean.getFlowContentStyle()}"
                        styleClass="#{flowBean.fullscreenPanelIndex !=-1 ? 'focus' : ''}"
                        id="flow-panels">
                    <c:forEach items="#{flowBean.panels}" var="panel" varStatus="status">
                        <p:outputPanel id="panel-${panel.prefixPanelIndex}-container" styleClass="#{flowBean.fullscreenPanelIndex !=-1 ? 'focus' : ''}">
                            <p:panel
                                    styleClass="#{panel.panelClass} #{flowBean.fullscreenPanelIndex == -1 ? '' : 'panel-docked focus'}"
                                    rendered="#{flowBean.fullscreenPanelIndex ==-1 || flowBean.fullscreenPanelIndex == status.index}"
                                    id="panel-${panel.prefixPanelIndex}"
                                    toggleable="#{flowBean.fullscreenPanelIndex ==-1}"
                                    closable="#{flowBean.fullscreenPanelIndex ==-1}"
                                    toggleableHeader="#{flowBean.fullscreenPanelIndex ==-1}"
                                    collapsed="#{flowBean.fullscreenPanelIndex != -1 ? false : panel.collapsed}">

                                <p:ajax event="close" listener="#{flowBean.closePanel(panel.prefixPanelIndex)}"
                                        update="flow"
                                        onstart="PF('newUnitDiag').hide();PF('buiContent').show();"
                                        oncomplete="PF('buiContent').hide()"
                                />
                                <p:ajax event="toggle"
                                        listener="#{flowBean.handleToggleOfPanel(panel.prefixPanelIndex)}"/>

                                <f:facet name="header">
                                    <p:outputPanel id="panel-${panel.prefixPanelIndex}-header" style="display: flex;gap: 0.5em; align-items: center;
                            flex-wrap: wrap; float:left;color: var(--main-color);">
                                        <ui:include rendered="#{panel.displayHeader() != null}"
                                                    src="#{panel.displayHeader()}">
                                            <ui:param name="panelModel" value="#{panel}"/>
                                        </ui:include>
                                    </p:outputPanel>
                                </f:facet>
                                <p:outputPanel id="panelContent-${panel.prefixPanelIndex}" deferred="false" loaded="#{panel.loaded}"
                                               deferredMode="visible" styleClass="#{flowBean.fullscreenPanelIndex !=-1 ? 'focus' : ''}">
                                    <f:facet name="loading">
                                        <div class="field" style="padding: 2em 3em;">
                                            <p:skeleton class="mb-2"/>
                                            <p:skeleton width="10rem" class="mb-2"/>
                                            <p:skeleton width="5rem" class="mb-2"/>
                                            <p:skeleton height="2rem" class="mb-2"/>
                                            <p:skeleton width="10rem" height="4rem"/>
                                            <p:skeleton width="10rem" class="mb-2"/>
                                            <p:skeleton width="5rem" class="mb-2"/>
                                            <p:skeleton height="2rem" class="mb-2"/>
                                            <p:skeleton width="10rem" height="4rem"/>
                                            <p:skeleton width="10rem" class="mb-2"/>
                                            <p:skeleton width="5rem" class="mb-2"/>
                                            <p:skeleton height="2rem" class="mb-2"/>
                                            <p:skeleton width="10rem" height="4rem"/>
                                            <p:skeleton width="10rem" class="mb-2"/>
                                            <p:skeleton width="5rem" class="mb-2"/>
                                            <p:skeleton height="2rem" class="mb-2"/>
                                            <p:skeleton width="10rem" height="4rem"/>
                                        </div>
                                    </f:facet>
                                    <p:ajax event="load" action="#{panel.loadData()}"
                                            update="panel-${panel.prefixPanelIndex}-container"/>
                                    <ui:include src="/panel/panelContent.xhtml" id="panel-body">
                                        <ui:param name="mode" value="FLOW"/>
                                        <ui:param name="panelModel" value="#{panel}"/>
                                        <ui:param name="panelIndex" value="#{panel.panelIndex}"/>
                                    </ui:include>
                                </p:outputPanel>
                                <f:facet name="actions">
                                    <h:form id="actionForm-${panel.prefixPanelIndex}">
                                        <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                                        <div style="padding: 3px;
    border: 1px solid var(--siamois-green-light);
    border-radius: 15px;">
                                            <p:commandLink id="refreshPanelButton"
                                                           styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default"
                                                           action="#{panel.refresh()}"
                                                           onstart="PF('buiPanel_${panel.prefixPanelIndex}').show();"
                                                           oncomplete="PF('buiPanel_${panel.prefixPanelIndex}').hide();"
                                                           onclick="event.stopPropagation();"
                                                           update="panel-${panel.prefixPanelIndex}">
                                                <h:outputText styleClass="bi bi-arrow-clockwise"/>
                                            </p:commandLink>
                                            <p:commandLink id="bookmarkToggleButton"
                                                           styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default"
                                                           action="#{navBean.togglePanelBookmark(panel)}"
                                                           onclick="event.stopPropagation();"
                                                           update="bookmarkToggleButton navBarCsrfForm:siamoisNavForm">
                                                <h:outputText styleClass="#{navBean.isPanelBookmarkedByUser(panel) ?
                            'ui-icon bi bi-bookmark-fill' : 'ui-icon bi bi-bookmark'}"/>
                                            </p:commandLink>
                                            <p:commandLink
                                                           action="#{flowBean.fullScreen(panel)}"
                                                           ajax="false"
                                                           id="focusButton"
                                                           styleClass="ui-panel-titlebar-icon ui-corner-all ui-state-default">
                                                <h:outputText styleClass="ui-icon bi bi-arrows-angle-expand"/>
                                            </p:commandLink>
                                        </div>

                                    </h:form>
                                </f:facet>
                            </p:panel>
                            <p:blockUI block="panel-${panel.prefixPanelIndex}"
                                       widgetVar="buiPanel_${panel.prefixPanelIndex}">
                                <i class="pi pi-spin pi-spinner" style="font-size: 3rem"/>
                            </p:blockUI>
                        </p:outputPanel>


                    </c:forEach>
                </h:panelGroup>
            </p:outputPanel>
        </p:outputPanel>

        <p:blockUI block="flow" widgetVar="buiContent">
            <i class="pi pi-spin pi-spinner" style="font-size: 3rem"/>
        </p:blockUI>

        <ui:include src="/dialog/document/newDocument.xhtml"/>
        <ui:include src="/dialog/newunit/newUnitDialog.xhtml"/>
        <ui:include src="/dialog/unsavedUpdates/unsavedUpdatesOnInstitutionChangeDialog.xhtml"/>

    </ui:define>


</ui:composition>
