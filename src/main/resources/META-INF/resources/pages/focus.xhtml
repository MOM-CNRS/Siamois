<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://xmlns.jcp.org/jsf/core"
                xmlns:form="http://java.sun.com/jsf/composite/pages/shared/form">

    <ui:define name="head">

        <title>#{focusViewBean.mainPanel.resolveTitleOrTitleCode()}</title>

        <link rel="icon"
              type="image/svg+xml"
              href="#{request.contextPath}#{focusViewBean.mainPanel.svgIcon()}"/>


    </ui:define>

    <ui:define name="metadata">
        <f:event type="preRenderView" listener="#{presentationBean.continueIfLogged()}"/>
        <f:metadata>
            <f:viewParam name="main" value="#{focusViewBean.mainToken}"/>
            <f:viewParam name="s" value="#{focusViewBean.secondaryToken}"/>
            <f:viewAction action="#{focusViewBean.beforeInit}" onPostback="false"/>
        </f:metadata>
    </ui:define>

    <ui:define name="content">

        <div style="display: flex; flex-direction: row; flex-shrink: 0">
            <div id="search-bar" class="hide-small-screen" style="flex:8">
                <form:csrfform formId="searchBarForm" id="searchBarCsrfForm">
                    <article>
                    <span class="ui-input-icon-right">
                        <p:autoComplete id="searchAutocomplete"
                                        styleClass="searchInput"
                                        style="width: 100%"
                                        value="#{searchBean.selected}"
                                        var="result"
                                        itemLabel="#{result.matchingTerm}"
                                        itemValue="#{result}"
                                        completeMethod="#{searchBean.completeText}"
                                        scrollHeight="250"
                        />
                    </span>
                    </article>
                </form:csrfform>
            </div>
            <div id="smallScreenToolbar" class="show-small-screen" style="align-content: center; flex:1;
            text-align:left; background: var(--siamois-green-light-100);padding: 0.5em">
                <form:csrfform formId="toggleButtonSidebarPanelForm" id="toggleButtonSidebarPanelCsrfForm">
                    <div style="display:flex;gap:1em;">
                        <p:commandButton icon="bi bi-list" onclick="toggleSiamoisSidebar()">

                        </p:commandButton>
                        <h:panelGroup styleClass="ui-inputgroup">
                            <h:panelGroup id="iconInstitSmallScreen" styleClass="ui-inputgroup-addon">
                                <i class="bi bi-buildings"/>
                            </h:panelGroup>
                            <p:selectOneMenu
                                    id="selectOneMenuInstitutionSmallScreen"
                                    value="#{flowBean.selectedInstitution}"
                                    filter="true"
                                    style="max-width: 10em; text-overflow: ellipsis"
                                    converter="#{institutionConverter}"
                                    filterMatchMode="startsWith"
                                    filterNormalize="true"
                                    var="inst"
                            >
                                <f:selectItems value="#{flowBean.institutions}"
                                               var="item"
                                               itemValue="#{item}"
                                               itemLabel="#{item.name}"
                                />

                                <p:column>
                                    <h:outputText value="#{inst.name}"/>
                                </p:column>

                                <p:ajax event="change"
                                        process="@this"
                                        listener="#{flowBean.onInstitutionChange}"
                                />
                            </p:selectOneMenu>
                        </h:panelGroup>
                    </div>

                </form:csrfform>
            </div>
            <div id="read-write-switch" style="align-content: center; flex:1;
            text-align:right; background: var(--siamois-green-light-100);padding: 0.5em; gap:0.5em; display: flex; flex-direction: row-reverse;">
                <h:form id="readWriteSwitchForm">
                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                    <p:selectBooleanButton id="readWriteSwitchButton" value="#{flowBean.isWriteMode}"
                                           offIcon="bi bi-eyeglasses" onIcon="bi bi-pen">
                        <p:ajax event="valueChange" listener="#{flowBean.changeReadWriteMode()}"
                                update="flow readWriteSwitchForm"
                                onstart="PF('buiContent').show()" oncomplete="PF('buiContent').hide()"/>
                    </p:selectBooleanButton>
                    <p:tooltip for="readWriteSwitchButton" value="#{flowBean.readWriteSwitchTooltip}"
                               position="bottom"/>
                </h:form>
                <h:form id="fieldDesktopSwitchForm">
                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                    <p:selectBooleanButton style="display:none;" value="#{flowBean.isFieldMode}"
                                           offIcon="bi bi-pc-display" onIcon="bi bi-phone" id="fieldOfficeSwitchButton">
                        <p:ajax event="valueChange" listener="#{flowBean.changeFieldOfficeMode()}"
                                update="flow fieldDesktopSwitchForm"
                                onstart="PF('buiContent').show()" oncomplete="PF('buiContent').hide()"/>
                    </p:selectBooleanButton>
                    <p:tooltip for="fieldOfficeSwitchButton" value="#{flowBean.fieldOfficeSwitchTooltip}"
                               position="bottom"/>
                </h:form>
                <ui:include src="/dialog/unsavedUpdates/unsavedUpdatesDialog.xhtml"/>
            </div>
        </div>

        <p:outputPanel style="display: flex;flex:1; flex-direction: row; overflow-y: hidden;" id="flow"
                       styleClass="focus">

            <h:form
                    id="subSidebarForm"
                    styleClass="sub-sidebar-container #{sidebarBean.visible ? '' : 'is-collapsed'} mode-#{sidebarBean.currentMode.name().toLowerCase()}"
                    style="height: 100%; flex-direction: column; align-items: center;"
            >
                <style>
                    .ui-datatable-invisible-header thead {
                        display: none !important;
                    }

                    .ui-datatable-invisible-header .ui-datatable-data tr td {
                        border: none !important;
                        padding: 4px 8px !important;
                    }

                    .bookmark-row {
                        display: flex;
                        align-items: center;
                        width: 100%;
                    }
                </style>

                <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>

                <p:outputLabel id="sidebarAnimatedInner" class="sidebar-animated-inner"
                               style="width: 320px; height: 100%; display: flex; flex-direction: column;">

                    <div id="historyDiv" style="background: white; width: 100%; border: 1px solid #dee2e6;">
                        <p:commandButton
                                id="toggle-sidebar-btn"
                                value="#{sidebarBean.currentMode == 'HISTORIQUE' ? 'Historique' : 'Favoris'}"
                                style="width: 100%"
                                icon="bi bi-chevron-double-left"
                                action="#{sidebarBean.close()}"
                                onstart="animateSidebarClose();"
                                update="sidebarContent"
                                process="@this"
                                styleClass="ui-button-flat"
                        />
                    </div>

                    <p:outputPanel id="sidebarContent" style="height: 100%; width: 100%; flex-grow: 1;">

                        <ui:fragment rendered="#{sidebarBean.currentMode == 'HISTORIQUE'}">
                            <div style="height: 100%">
                                <p:dataTable id="historyTable"
                                             value="#{historyBean.items}"
                                             var="historyItem"
                                             rowKey="#{historyItem.id}"
                                             scrollable="true"
                                             scrollRows="40"
                                             scrollHeight="100%"
                                             virtualScroll="true"
                                             styleClass="ui-datatable-invisible-header panel-menu">



                                    <p:column style="vertical-align: middle; width:100%">
                                        <div class="bookmark-row" style="width: 100%;">

                                                    <p:commandButton id="historyLink"
                                                                     action="#{historyBean.redirectToEntry(historyItem)}"
                                                                     icon="#{historyItem.icon}"
                                                                     process="@this"
                                                                     value="#{historyItem.title}"
                                                                     styleClass="#{historyItem.styleClass} nav-link ui-button-flat bookmark-full-button"
                                                                     style="width:100%">
                                                    </p:commandButton>
                                                    <p:tooltip for="historyLink"
                                                               value="#{historyItem.title}"/>

                                        </div>
                                    </p:column>
                                </p:dataTable>
                            </div>
                        </ui:fragment>

                        <ui:fragment rendered="#{sidebarBean.currentMode == 'BOOKMARKS'}">
                            <div style="height: 100%">
                                <p:dataTable id="bookmarksTable"
                                             value="#{bookmarkMenuBean.lazyModel}"
                                             var="bkm"
                                             lazy="true"
                                             editable="true"
                                             rowKey="#{bkm.id}"
                                             scrollable="true"
                                             scrollRows="40"
                                             scrollHeight="100%"
                                             virtualScroll="true"
                                             styleClass="ui-datatable-invisible-header panel-menu">

                                    <p:ajax event="rowEdit" listener="#{bookmarkMenuBean.onRowEdit}"
                                            update="bookmarksTable"/>
                                    <p:ajax event="rowEditCancel" listener="#{bookmarkMenuBean.onRowCancel}"/>


                                    <p:column style="vertical-align: middle; width:100%">
                                        <div class="bookmark-row" style="width: 100%;">
                                            <p:cellEditor style="width: 100%" >
                                                <f:facet name="output">
                                                    <p:commandButton id="bookmarkLink"
                                                                     action="#{bookmarkMenuBean.redirectToEntry(bkm)}"
                                                                     icon="#{bkm.bookmarkIcon}"
                                                                     process="@this"
                                                                     value="#{bookmarkMenuBean.resolveName(bkm)}"
                                                                     styleClass="nav-link ui-button-flat bookmark-full-button"
                                                                     style="color: #{bkm.bookmarkColor} !important; width:100%">
                                                    </p:commandButton>
                                                    <p:tooltip for="bookmarkLink"
                                                               value="#{bookmarkMenuBean.resolveName(bkm)}"/>
                                                </f:facet>

                                                <f:facet name="input">
                                                    <div style="display: flex; align-items: center; width: 100%; padding: 4px 12px;">
                                                        <i class="#{bkm.bookmarkIcon}"
                                                           style="margin-right: 8px; color: #{bkm.bookmarkColor};"/>
                                                        <p:inputText value="#{bkm.title}" style="width: 100%;"
                                                                     required="true"/>
                                                    </div>
                                                </f:facet>
                                            </p:cellEditor>
                                        </div>
                                    </p:column>

                                    <p:column style="width: 40px; text-align: center; vertical-align: middle;">
                                        <p:rowEditor rendered="#{bookmarkMenuBean.canEditViewNameOfBookmark(bkm)}"
                                                     editTitle="Modifier" saveTitle="Valider" cancelTitle="Annuler" />
                                    </p:column>

                                    <p:column style="width: 40px; text-align: center; vertical-align: middle;">
                                        <p:commandButton action="#{bookmarkMenuBean.deleteItem(bkm)}"
                                                         icon="bi bi-trash"

                                                         update="bookmarksTable"
                                                         process="@this"
                                                         styleClass="ui-button-flat ui-button-danger rounded-button"/>
                                    </p:column>
                                </p:dataTable>
                            </div>
                        </ui:fragment>

                    </p:outputPanel>
                </p:outputLabel>
            </h:form>

            <p:outputPanel id="flowContent" styleClass="flow fullscreen-flow focus">
                <h:panelGroup
                        style="display:flex;flex-direction: column;gap:0em;padding:0em;border-radius:0px; border:0px;"
                        styleClass="focus"
                        id="flow-panels">

                    <p:outputPanel id="panel-${focusViewBean.mainPanel.prefixPanelIndex}-container" styleClass="focus">
                        <h:panelGroup
                                styleClass="#{focusViewBean.mainPanel.panelClass} panel-docked focus"
                                style="border-radius: 0px; display: flex; flex-direction: column; border-top: 3px solid var(--main-color)"
                                id="panel-${focusViewBean.mainPanel.prefixPanelIndex}">

                            <div class="sideview-titlebar" style="background: var(--siamois-green-light-100);">
                                <h:form style="float:right;" id="actionForm-${focusViewBean.mainPanel.panelIndex}">
                                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                                    <p:splitButton id="dirtyViewSplitButton"
                                                   rendered="#{focusViewBean.mainPanel.canUserUpdateView()
                                                   and focusViewBean.mainPanel.isDirty()
                                                   and focusViewBean.mainPanel.isBookmarked()}"
                                                   value="Mettre à jour"
                                                   icon="bi bi-bookmark"
                                                   action="#{focusViewBean.mainPanel.updateCurrentBookmark()}"
                                                   update="panel-${focusViewBean.mainPanel.prefixPanelIndex}">
                                        <p:menuitem value="Enregistrer comme nouvelle vue"
                                                    update="panel-${focusViewBean.mainPanel.prefixPanelIndex}, subSidebarForm"
                                                    action="#{focusViewBean.mainPanel.saveAsNewView()}"
                                                    icon="bi bi-bookmark-plus"/>
                                        <p:menuitem value="Réinitialiser la vue"
                                                    update="panel-${focusViewBean.mainPanel.prefixPanelIndex}"
                                                    action="#{focusViewBean.mainPanel.reinitializeView()}"
                                                    icon="bi bi-arrow-clockwise"/>
                                    </p:splitButton>
                                    <p:splitButton value="Enregistrer comme nouvelle vue"
                                                   update="panel-${focusViewBean.mainPanel.prefixPanelIndex}, subSidebarForm"
                                                   action="#{focusViewBean.mainPanel.saveAsNewView()}"
                                                   icon="bi bi-bookmark-plus">
                                        <p:menuitem value="Réinitialiser la vue"
                                                    update="panel-${focusViewBean.mainPanel.prefixPanelIndex}"
                                                    action="#{focusViewBean.mainPanel.reinitializeView()}"
                                                    icon="bi bi-arrow-clockwise"/>
                                    </p:splitButton>
                                    <div style="padding: 3px;
                                            display: flex;
                                            border: 1px solid var(--siamois-green-light);
                                            border-radius: 15px;">
                                        <p:commandLink id="bookmarkToggleButton"
                                                       styleClass="sideview-topbar-button"
                                                       action="#{focusViewBean.mainPanel.togglePanelBookmark()}"
                                                       update="bookmarkToggleButton, navBarCsrfForm:siamoisNavForm, subSidebarForm, actionForm-#{focusViewBean.mainPanel.panelIndex}">
                                            <h:outputText styleClass="#{focusViewBean.mainPanel.isBookmarked() ?
                            'ui-icon bi bi-bookmark-fill' : 'ui-icon bi bi-bookmark'}"/>
                                        </p:commandLink>
                                        <p:commandLink id="refreshPanelButton"
                                                       styleClass="sideview-topbar-button"
                                                       action="#{focusViewBean.mainPanel.refresh()}"
                                                       onstart="PF('buiPanel_${focusViewBean.mainPanel.panelIndex}').show();"
                                                       oncomplete="PF('buiPanel_${focusViewBean.mainPanel.panelIndex}').hide();"
                                                       onclick="event.stopPropagation();"
                                                       update="panel-${focusViewBean.mainPanel.prefixPanelIndex}">
                                            <h:outputText styleClass="bi bi-arrow-clockwise"/>
                                        </p:commandLink>
                                    </div>

                                </h:form>

                                <h:form id="actionForm-${focusViewBean.mainPanel.panelIndex}-head">
                                    <input type="hidden" name="${_csrf.parameterName}" value="${_csrf.token}"/>
                                    <div style="display: flex;
                                    gap: 0.5em;
                                    align-items: center;
                                    flex-wrap: wrap;">
                                        <ui:include rendered="#{focusViewBean.mainPanel.displayHeader() != null}"
                                                    src="#{focusViewBean.mainPanel.displayHeader()}">
                                            <ui:param name="panelModel" value="#{focusViewBean.mainPanel}"/>
                                        </ui:include>
                                    </div>
                                </h:form>

                            </div>
                            <p:outputPanel id="panelContent" deferred="false" loaded="#{focusViewBean.mainPanel.loaded}"
                                           deferredMode="visible" styleClass="focus" style="min-height: 0">
                                <f:facet name="loading">
                                    <div class="field" style="padding: 2em 3em;">
                                        <p:skeleton class="mb-2"/>
                                        <p:skeleton width="10rem" class="mb-2"/>
                                        <p:skeleton width="5rem" class="mb-2"/>
                                        <p:skeleton height="2rem" class="mb-2"/>
                                        <p:skeleton width="10rem" height="4rem"/>
                                        <p:skeleton width="10rem" class="mb-2"/>
                                        <p:skeleton width="5rem" class="mb-2"/>
                                        <p:skeleton height="2rem" class="mb-2"/>
                                        <p:skeleton width="10rem" height="4rem"/>
                                        <p:skeleton width="10rem" class="mb-2"/>
                                        <p:skeleton width="5rem" class="mb-2"/>
                                        <p:skeleton height="2rem" class="mb-2"/>
                                        <p:skeleton width="10rem" height="4rem"/>
                                        <p:skeleton width="10rem" class="mb-2"/>
                                        <p:skeleton width="5rem" class="mb-2"/>
                                        <p:skeleton height="2rem" class="mb-2"/>
                                        <p:skeleton width="10rem" height="4rem"/>
                                    </div>
                                </f:facet>
                                <p:ajax event="load" action="#{focusViewBean.mainPanel.loadData()}"
                                        update="panel-${focusViewBean.mainPanel.panelIndex}-container"/>
                                <ui:include src="/panel/panelContent.xhtml" id="panel-body">
                                    <ui:param name="mode" value="FOCUS"/>
                                    <ui:param name="panelModel" value="#{focusViewBean.mainPanel}"/>
                                    <ui:param name="panelIndex" value="#{focusViewBean.mainPanel.panelIndex}"/>
                                </ui:include>
                            </p:outputPanel>
                        </h:panelGroup>
                        <p:blockUI block="panel-${focusViewBean.mainPanel.panelIndex}"
                                   widgetVar="buiPanel_${focusViewBean.mainPanel.panelIndex}">
                            <i class="pi pi-spin pi-spinner" style="font-size: 3rem"/>
                        </p:blockUI>
                    </p:outputPanel>


                </h:panelGroup>
            </p:outputPanel>
        </p:outputPanel>

        <p:blockUI block="flow" widgetVar="buiContent">
            <i class="pi pi-spin pi-spinner" style="font-size: 3rem"/>
        </p:blockUI>

        <ui:include src="/dialog/document/newDocument.xhtml"/>
        <ui:include src="/dialog/newunit/newUnitDialog.xhtml"/>
        <ui:include src="/dialog/unsavedUpdates/unsavedUpdatesOnInstitutionChangeDialog.xhtml"/>

    </ui:define>


</ui:composition>
