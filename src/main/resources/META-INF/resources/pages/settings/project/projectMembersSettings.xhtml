<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:settings="http://java.sun.com/jsf/composite/pages/settings/components"
                xmlns:p="http://primefaces.org/ui"
                xmlns:form="http://java.sun.com/jsf/composite/pages/shared/form" xmlns:f="http://java.sun.com/jsf/core">

    <ui:define name="metadata">
        <f:event type="preRenderView" listener="#{navBean.onPreRenderView}"/>
        <f:event type="preRenderView" listener="#{projectDetailsBean.checkProjectOrRedirect}"/>
    </ui:define>

    <ui:define name="head">
        <h:outputStylesheet library="css" name="settings.css"/>
    </ui:define>

    <ui:define name="content">
        <main>
            <form:csrfform formId="breadCrumbForm" styleClass="breadCrumpForm">
                <p:breadCrumb homeDisplay="false">
                    <p:menuitem value="Projets" action="#{projectDetailsBean.goToProjectList()}"/>
                    <p:menuitem value="#{projectDetailsBean.project.name}" action="#{projectDetailsBean.backToProjectSettings()}"/>
                    <p:menuitem value="#{langBean.msg('projectSettings.titles.members')}"/>
                </p:breadCrumb>
            </form:csrfform>
            <settings:datatable
                    id="projectMembersDatatable"
                    title="#{langBean.msg('projectSettings.members.title', projectDetailsBean.project.name)}"
                    filterAction="#{projectMembersListBean.filter()}"
                    formId="projectMembersForm"
                    addAction="#{projectMembersListBean.add()}"
                    searchInputTextValue="#{projectMembersListBean.searchInput}"
                    description="#{langBean.msg('projectSettings.members.description')}"
                    renderCreateButton="true"
                    createButtonLabel="#{langBean.msg('projectSettings.members.dialog.label')}"
            >
                <p:dataTable
                        id="membersDatatable"
                        value="#{projectMembersListBean.members}"
                        var="member"
                        sortMode="single"
                        widgetVar="projectMembersDatatableWidget"
                        rowKey="#{member.id}"
                >
                    <p:autoUpdate/>
                    <p:column headerText="#{langBean.msg('common.label.user')}">
                        <div style="display: flex; align-items: center; gap: 11px">
                            <span class="member-avatar">#{member.person.initials()}</span>
                            <div style="display: flex; flex-direction: column">
                                <strong>#{member.displayName()}</strong>
                                <p style="margin-bottom: 0; font-style: italic">#{member.person.email}</p>
                                <p>#{member.person.username}</p>
                            </div>
                        </div>
                    </p:column>
                    <p:column headerText="#{langBean.msg('common.label.profile')}">
                        <p:selectCheckboxMenu value="#{member.profiles}"
                                               id="profileSelect"
                                               converter="#{profileDTOConverter}"
                                               panelStyleClass="profile-select-panel"
                                               label="#{langBean.msg('common.label.profile')}"
                                               updateLabel="true"
                                               filter="true"
                                               filterMatchMode="contains"
                                               scrollHeight="200">
                            <f:selectItems value="#{projectMembersListBean.availableProfiles}" var="p" itemLabel="#{p.name}" itemValue="#{p}"/>
                            <p:ajax process="@this"/>
                        </p:selectCheckboxMenu>
                    </p:column>
                    <p:column headerText="#{langBean.msg('common.label.accountStatus')}">
                        <span class="chip #{member.person.enabled ? 'chip-status-active' : 'chip-status-inactive'}">
                            #{member.person.enabled ? langBean.msg('common.label.accountStatus.enabled') : langBean.msg('common.label.accountStatus.disabled')}
                        </span>
                    </p:column>
                    <p:column>
                        <p:commandButton value="#{langBean.msg('common.action.remove')}"
                                         actionListener="#{projectMembersListBean.removeMember(member)}"
                                         update="membersDatatable"
                                         styleClass="ui-button-danger"/>
                    </p:column>
                </p:dataTable>
            </settings:datatable>
            <ui:include src="/dialog/project/newProjectMember.xhtml"/>
        </main>
    </ui:define>

</ui:composition>
