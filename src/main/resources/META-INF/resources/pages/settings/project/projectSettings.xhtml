<?xml version="1.0" encoding="UTF-8"?>
<ui:composition template="/template.xhtml"
                xmlns="http://www.w3.org/1999/xhtml"
                xmlns:h="http://xmlns.jcp.org/jsf/html"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:settings="http://java.sun.com/jsf/composite/pages/settings/components"
                xmlns:p="http://primefaces.org/ui"
                xmlns:form="http://java.sun.com/jsf/composite/pages/shared/form"
>

    <ui:define name="head">
        <h:outputStylesheet library="css" name="settings.css"/>
    </ui:define>

    <ui:define name="content">
        <main class="container-lg">
            <form:csrfform formId="breadCrumbForm" styleClass="breadCrumpForm" >
                <p:breadCrumb homeDisplay="false">
                    <p:menuitem value="Projets" action="#{projectDetailsBean.goToProjectList()}"/>
                    <p:menuitem value="#{projectDetailsBean.project.name}" action="#{projectDetailsBean.backToProjectSettings()}"/>
                    <p:menuitem value="Importer et exporter les données"/>
                </p:breadCrumb>

            </form:csrfform>
            <settings:settingsCategory
                    title="#{projectDetailsBean.project.name}"
                    formId="projectDetailsForm"
                    options="#{projectDetailsBean.elements}"
            />
        </main>
    </ui:define>

</ui:composition>
