<!-- /pages/shared/table/entityDataTable.xhtml -->
<ui:composition xmlns="http://www.w3.org/1999/xhtml"
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
                xmlns:p="http://primefaces.org/ui"
                xmlns:f="http://java.sun.com/jsf/core" xmlns:c="http://java.sun.com/jsp/jstl/core"
                xmlns:h="http://java.sun.com/jsf/html"
>

    <!--@elvariable id="tableModel" type="fr.siamois.ui.table.viewmodel.EntityTableViewModel"-->

    <style>
        .filter-table-column-hidden .ui-column-filter {
            display: none !important;
        }

        .ui-datatable thead th {
            text-align: left;
            vertical-align: top;
        }

        .ui-datatable thead th .ui-column-title,
        .ui-datatable thead th .ui-sortable-column-icon {
            display: inline-block;
            vertical-align: middle;
        }

        .ui-datatable thead th .ui-column-filter {
            display: block;
            width: 100%;
            margin-top: 0.5rem;
            box-sizing: border-box;
        }

        .ui-datatable tr.overview-open > td {
            border-top: 2px solid var(--siamois-green-active) !important;
            border-bottom: 2px solid var(--siamois-green-active) !important;
        }
        .ui-datatable tr.overview-open > td:first-child {
            border-left: 2px solid var(--siamois-green-active) !important;
        }
        .ui-datatable tr.overview-open > td:last-child {
            border-right: 2px solid var(--siamois-green-active) !important;
        }

    </style>

    <p:blockUI block="entityDatatable" trigger="#{cc.clientId}:entityDatatable" widgetVar="#{cc.clientId}_buiDataTables">
        <i class="pi pi-spin pi-spinner" style="font-size: 3rem"/>
    </p:blockUI>

    <p:dataTable paginator="true"
                 rendered="#{not tableModel.treeMode}"
                 cellNavigation="true"
                 id="entityDatatable"
                 varStatus="status"
                 size="small"
                 rowHover="true"
                 paginatorPosition="bottom"
                 var="item"
                 selectionPageOnly="false"
                 selectionRowMode="none"
                 selection="#{tableModel.lazyDataModel.selectedUnits}"
                 widgetVar="#{cc.clientId}_entityDatatable"
                 lazy="true"
                 rowKey="#{item.id}"
                 globalFilter="#{tableModel.globalFilter}"
                 allowUnsorting="true"
                 sortBy="#{tableModel.lazyDataModel.sortBy}"
                 rows="#{tableModel.lazyDataModel.pageSizeState}"
                 first="#{tableModel.lazyDataModel.first}"
                 sortMode="multiple"
                 filteredValue="#{tableModel.lazyDataModel.filtered}"
                 partialUpdate="false"
                 emptyMessage="#{langBean.msg('recordingUnitList.empty')}"
                 paginatorTemplate="#{langBean.msg('label.resultsPerPage')}: {RowsPerPageDropdown} {RowReport} {FirstPageLink} {PreviousPageLink} {PageLinks} {NextPageLink} {LastPageLink}"
                 rowsPerPageTemplate="5,10,15,20,25"
                 rowIndexVar="rowIndex"
                 tableStyle="table-layout: auto;"
                 tableStyleClass="datatable-hoverable-table"
                 rowStyleClass="#{tableModel.getRowStyleClass(item)}"
                 value="#{tableModel.lazyDataModel}"
                 styleClass="#{tableClass} #{not tableModel.columnFilteringEnabled ? 'filter-table-column-hidden' : ''}">

        <p:ajax event="rowSelectCheckbox" action="#{tableModel.handleSelectionChange()}" update="selectedCountChip"/>
        <p:ajax event="rowUnselectCheckbox" action="#{tableModel.handleSelectionChange()}" update="selectedCountChip"/>
        <p:ajax event="toggleSelect" action="#{tableModel.handleSelectionChange()}" update="selectedCountChip"/>

        <f:facet name="{RowReport}">
            <span class="ui-paginator-current">
                #{tableModel.lazyDataModel.getFirstIndexOnPage()}-#{tableModel.lazyDataModel.getLastIndexOnPage()} of #{tableModel.lazyDataModel.rowCount}
            </span>
        </f:facet>

        <f:facet name="header">
            <ui:include src="/pages/shared/table/tableToolbar.xhtml">
                <ui:param name="tableModel" value="#{tableModel}" />
                <ui:param name="updateTableString" value="#{updateTableString}" />
                <ui:param name="tableId" value="entityDatatable"/>
                <ui:param name="columnFilteringEnabled" value="true"/>
            </ui:include>
        </f:facet>

        <p:column styleClass="small-cell" selectionBox="true" toggleable="false">
            <f:facet name="header">
                <p:chip id="selectedCountChip"
                        style="background-color: var(--siamois-green-light-100)"
                        label="#{tableModel.getSelectedAndTotalCount()}"
                />
            </f:facet>
        </p:column>

        <p:column style="width: min-content;"
                  styleClass="small-cell"
                  headerText="Statut"
                  id="statusCol" toggleable="false"
        >
            <ui:include src="/panel/header/validationButton.xhtml" >
                <ui:param name="disabled" value="true"/>
                <ui:param name="unit" value="#{item}"/>
            </ui:include>
        </p:column>

        <!-- link: chip (icône + texte) cliquable + crayon au hover pour édition -->
        <p:column style="min-width: 10px;"
                  styleClass="small-cell"
                  id="linkCol" width="fit-content" toggleable="false">

            <style>
                .chip-cell-wrapper { display: flex; align-items: center; gap: 4px; flex-wrap: nowrap; }
                .chip-cell-actions { visibility: hidden; display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
                .chip-cell-wrapper:hover .chip-cell-actions { visibility: visible; }
                .chip-nav-link { text-decoration: none !important; color: inherit !important; }
                .entity-nav-chip { cursor: pointer; }
                .entity-nav-chip:hover { filter: brightness(0.95); }
            </style>



            <p:outputPanel id="chipCell" layout="block">

                <!-- READ mode -->
                <h:panelGroup rendered="#{not tableModel.isEditingLink(item)}"
                              styleClass="chip-cell-wrapper">

                    <!-- Chip cliquable → navigation -->
                    <p:commandLink id="chipNavigate"
                                   styleClass="chip-nav-link"
                                   action="#{tableModel.handleAction(tableModel.tableDefinition.commandLinkColumn, item)}"
                                   onstart="#{tableModel.tableDefinition.commandLinkColumn.onstartJs}"
                                   oncomplete="#{tableModel.getOnCompleteJs(item)}"
                                   immediate="true"
                                   process="@this">
                        <p:chip label="#{tableModel.resolveText(tableModel.tableDefinition.commandLinkColumn, item)}"
                                icon="#{tableModel.tableDefinition.commandLinkColumn.iconClass}"
                                styleClass="entity-nav-chip"
                                style="background: #{tableModel.tableDefinition.commandLinkColumn.chipColor}; color: white;"/>
                    </p:commandLink>

                    <!-- Bouton crayon : visible au hover de la cellule -->
                    <div class="chip-cell-actions">
                        <p:commandButton id="editChipBtn"
                                         rendered="#{tableModel.tableDefinition.commandLinkColumn.editable}"
                                         icon="bi bi-pencil"
                                         styleClass="rum-action-btn"
                                         action="#{tableModel.startEditLink(item)}"
                                         update="chipCell"
                                         process="@this"
                                         title="Modifier"/>
                    </div>

                    <p:contextMenu for="chipNavigate">
                        <p:menuitem value="Ouvrir dans un panel" disabled="true" icon="bi bi-box-arrow-in-up"/>
                        <p:menuitem value="Ouvrir en mode Focus" disabled="true" icon="bi bi-arrows-angle-expand"/>
                        <p:menuitem value="Ouvrir dans l'aperçu lateral" icon="bi bi-layout-sidebar-inset-reverse"
                                    action="#{tableModel.handleAction(tableModel.tableDefinition.commandLinkColumn, item)}"
                                    onstart="#{tableModel.tableDefinition.commandLinkColumn.onstartJs}"
                                    oncomplete="#{tableModel.getOnCompleteJs(item)}"/>
                    </p:contextMenu>

                </h:panelGroup>

                <!-- EDIT mode -->
                <h:panelGroup rendered="#{tableModel.isEditingLink(item)}"
                              style="display:flex; align-items:center; gap:4px;">
                    <p:inputText id="editLinkInput"
                                 value="#{tableModel.editingLinkValue}"
                                 style="min-width: 8em;"/>
                    <p:commandButton icon="bi bi-check"
                                     styleClass="rum-action-btn"
                                     title="Valider"
                                     action="#{tableModel.applyLinkEdit(item)}"
                                     update="chipCell"
                                     process="editLinkInput @this"/>
                    <p:commandButton icon="bi bi-x"
                                     styleClass="rum-action-btn"
                                     title="Annuler"
                                     action="#{tableModel.cancelEditLink()}"
                                     update="chipCell"
                                     process="@this"/>
                </h:panelGroup>

            </p:outputPanel>
        </p:column>

        <!-- Actions Column -->
        <p:column styleClass="small-cell" exportable="false" toggleable="false" style="min-width: 10px;">
            <p:toolbar style="padding-top: 0;
            padding-bottom: 0;">
                <p:toolbarGroup styleClass="action-col">
                    <ui:repeat value="#{tableModel.rowActions}" var="action">
                        <p:commandButton
                                rendered="#{tableModel.isRendered(action, item)}"
                                icon="#{tableModel.resolveIcon(action, item)}"
                                action="#{tableModel.handleRowAction(action, item)}"
                                process="#{empty action.processExpr ? '@this' : action.processExpr}"
                                update="#{action.updateSelfTable ? (':'.concat(cc.clientId).concat(':entityDatatable')) : action.updateExpr}"
                                styleClass="#{action.styleClass}"/>
                    </ui:repeat>
                </p:toolbarGroup>
            </p:toolbar>
        </p:column>



        <c:forEach var="column" items="#{tableModel.columns}" varStatus="colStatus">
            <p:column
                    id="col_#{colStatus.index}"
                    styleClass="small-cell"
                    style="min-width: #{column.type != 'COMMAND_LINK' ? '10em' : ''};"
                    sortable="#{column.sortable}"
                    resizable="true"
                    filterable="#{column.filterable}"
                    visible="#{column.visible}"
                    field="#{column.field.valueBinding}"
                    filterBy="#{column.field.valueBinding}"
                    sortBy="#{column.field.valueBinding}"
                    toggleable="#{column.type != 'COMMAND_LINK'}"
            >
                <ui:include src="/pages/shared/table/filterTemplate.xhtml">
                    <ui:param name="tableModel" value="#{tableModel}"/>
                </ui:include>

                <ui:include src="/pages/shared/table/columnTemplates.xhtml">
                    <ui:param name="tableModel" value="#{tableModel}" />
                    <ui:param name="column" value="#{column}" />
                    <ui:param name="item" value="#{item}" />
                    <ui:param name="status" value="#{status}" />
                    <ui:param name="rowIndex" value="#{rowIndex}" />
                    <ui:param name="colIndex" value="#{colStatus.index}" />
                    <ui:param name="updateTableString" value="@this #{updateTableString}"/>
                    <ui:param name="canUserEditRow" value="#{tableModel.canUserEditRow(item)}"/>
                </ui:include>
            </p:column>
        </c:forEach>


    </p:dataTable>


</ui:composition>
