<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:cc="http://java.sun.com/jsf/composite"
        xmlns:p="http://primefaces.org/ui"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:h="http://java.sun.com/jsf/html"
>

    <cc:interface>
        <cc:attribute name="answer" type="fr.siamois.ui.viewmodel.fieldanswer.CustomFieldAnswerSelectOneSpatialUnitViewModel" required="true"/>
        <cc:attribute name="hasBeenModified" type="Boolean" required="false" default="false"/>
        <cc:attribute name="field" type="fr.siamois.domain.models.form.customfield.CustomFieldSelectOneSpatialUnit" required="true"/>
        <cc:attribute name="label" type="String" required="false"/>
        <cc:attribute name="required" type="java.lang.Boolean" required="true"/>
        <cc:attribute name="mode" type="String" required="false" default="READ"/>
        <cc:attribute name="updateTargetsOnBlur" type="String" required="false" default="@this"/>
        <cc:attribute name="multiple" type="Boolean" required="false" default="false"/>
        <cc:attribute name="onModified" method-signature="void setFieldAnswerHasBeenModified(javax.faces.event.AjaxBehaviorEvent)" required="false"/>
        <cc:attribute name="spatialUnitOptions" type="java.util.List" required="true" shortDescription="List of SpatialUnit to display in the dropdown"/>
        <cc:attribute name="displayType" type="java.lang.Boolean" required="false" default="false"/>
        <cc:attribute name="panelId" type="String" required="false"/>
        <cc:attribute name="formCtx" type="fr.siamois.ui.form.EntityFormContext" required="true"/>
    </cc:interface>

    <cc:implementation>
        <p:outputPanel id="inplace">
            <!-- ===== MODE DISPLAY ===== -->
            <h:panelGroup rendered="#{cc.attrs.mode ne 'input'}">
                <!-- Single value -->
                <h:panelGroup rendered="#{(not cc.attrs.multiple) and (not empty cc.attrs.answer.value)}">
                    <div style="display:flex;gap:0.5em;">
                        <p:commandLink
                                styleClass="spatial-unit"
                                value="#{cc.attrs.answer.value.name}"
                                action="#{navBean.redirectToSpatialUnit}"
                                ajax="false">
                            <f:param name="id" value="#{cc.attrs.answer.value.id}"/>
                        </p:commandLink>

                        <p:chip rendered="#{cc.attrs.displayType}"
                                label="#{labelBean.findLabelOf(cc.attrs.answer.value.category)}"
                                styleClass="mr-2 spatial-unit-type-chip"/>
                    </div>
                </h:panelGroup>
            </h:panelGroup>

            <!-- ===== MODE EDIT ===== -->
            <h:panelGroup id="inputGroup" rendered="#{cc.attrs.mode eq 'input'}">

                <p:autoComplete value="#{cc.attrs.answer.value}"
                                id="select-one-spatial-unit"
                                completeMethod="#{geoApiService.search}"
                                panelStyleClass="spatial-unit"
                                styleClass="spatial-unit #{cc.attrs.answer.hasBeenModified ? 'track-change sia-modified-field': 'track-change'}"
                                required="false"
                                var="su"
                                itemValue="#{su}"
                                itemLabel="#{su.name}"
                                onmousedown="event.stopPropagation();"
                                onclick="event.stopPropagation();"
                                converter="#{placeSuggestionConverter}"
                                forceSelection="true"
                                scrollHeight="300"
                                dropdown="true"
                                showEmptyMessage="false"
                                maxResults="#{fieldConfigurationService.resultLimit()}">
                    <p:column>
                        <div style="display:flex;gap:0.5em;align-items: center">
                            <i class="#{su.isExternal() ? 'bi bi-globe2' : 'bi bi-database'}"
                               style="margin-right: 10px; color: #{su.isExternal() ? 'black' : 'var(--text-main)'};"/>
                            <div style="display:flex; flex-direction: column">
                                <div style="display:flex; gap:0.5em; align-items: center;">
                                    <p:outputLabel value="#{su.name}"/>
                                    <p:chip
                                            label="#{labelBean.findLabelOf(su.category)}"
                                            styleClass="mr-2 spatial-unit-type-chip"/>

                                </div>

                                <small>#{su.code}</small>
                            </div>

                            <p:chip
                                    style="
                                    background: transparent;
                                    border: 1px solid #{su.isExternal() ? 'var(--text-main)' : 'var(--siamois-green)'};
                                    color: #{su.isExternal() ? 'var(--text-main)' : 'var(--siamois-green)'};
                                    margin-left:auto;"
                                    label="#{su.sourceName}"
                            />

                        </div>
                    </p:column>
                    <p:ajax update="#{cc.attrs.updateTargetsOnBlur}"
                            process="@this"
                            onstart="$(PrimeFaces.escapeClientId('#{cc.clientId}:input')).removeClass('sia-modified-field'); showSpinner('#{cc.attrs.panelId}')"
                            oncomplete="hideSpinner('#{cc.attrs.panelId}')"
                            onerror="handleAutoSaveError(xhr, status, '#{cc.attrs.panelId}'); $(PrimeFaces.escapeClientId('#{cc.clientId}:input')).addClass('sia-modified-field');"
                            listener="#{cc.attrs.onModified}"/>
                    <f:facet name="footer">
                        <div id="footer" class="ui-fluid" style="padding:0.5rem 1rem 1rem 1rem">
                            <p:commandButton
                                    id="btnNouveau"
                                    icon="bi bi-plus-lg"
                                    process="@this"
                                    oncomplete="PF('#{cc.clientId}_spatialUnitMenu').hide();var ov = PF('#{cc.clientId}_overlay'); ov.show(); ov.align();"
                                    value="Nouveau"
                                    update="#{cc.clientId}"/>
                        </div>
                    </f:facet>
                </p:autoComplete>

                <p:overlayPanel for="#{cc.clientId}:select-one-spatial-unit" my="left top" at="left bottom" showEvent="none"
                                widgetVar="#{cc.clientId}_overlay"
                                dismissable="false"
                                autoHide="true"
                                showCloseIcon="true"
                                dynamic="true" id="overlayNouveau" appendTo="#{cc.clientId}"
                                hideEffect="fade">
                    <h:panelGrid columns="2" cellpadding="5" id="newGrid">
                        <p:outputLabel for="newUnitName" value="Nom:"/>
                        <p:inputText value="#{cc.attrs.answer.newName}"
                                     id="newUnitName"
                                     required="true"
                        />

                        <p:outputLabel for="newUnitTypeAutocomplete" value="Type:"/>
                        <p:autoComplete value="#{cc.attrs.answer.newType}"
                                        id="newUnitTypeAutocomplete"
                                        completeMethod="#{spatialUnitFieldBean.completeWithFieldCode}"
                                        var="autocompleteDto"
                                        panelStyleClass="#{cc.attrs.panelStyleClass}"
                                        itemValue="#{autocompleteDto}"
                                        itemLabel="#{autocompleteDto.conceptLabelToDisplay.label}"
                                        required="true"
                                        onmousedown="event.stopPropagation();"
                                        onclick="event.stopPropagation();"
                                        converter="#{conceptAutocompleteDTOConverter}"
                                        forceSelection="true"
                                        scrollHeight="300"
                                        dropdown="true"
                                        placeholder="#{langBean.msg('common.action.chooseConcept')}"
                                        showEmptyMessage="false"
                                        maxResults="#{fieldConfigurationService.resultLimit()}">
                            <f:attribute name="fieldCode" value="SIASU.TYPE"/>
                        </p:autoComplete>

                        <p:commandButton
                                style="background: var(--siamois-green-active); border-color: var(--siamois-green-active);"
                                value="Créer"
                                action="#{cc.attrs.formCtx.saveNewPlaceFromField(cc.attrs.answer)}"
                                process="newGrid"
                                onsuccess="PF('#{cc.clientId}_overlay').hide();"
                                update="select-one-spatial-unit @this overlayNouveau templateFormCC:templateForm:templateGrowl"/>
                    </h:panelGrid>
                </p:overlayPanel>
            </h:panelGroup>
        </p:outputPanel>
    </cc:implementation>
</ui:composition>
