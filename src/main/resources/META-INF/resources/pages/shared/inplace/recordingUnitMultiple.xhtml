<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:cc="http://java.sun.com/jsf/composite"
        xmlns:p="http://primefaces.org/ui" xmlns:f="http://java.sun.com/jsf/core" xmlns:h="http://java.sun.com/jsf/html"
>

    <cc:interface>
        <cc:attribute name="answer"
                      type="fr.siamois.ui.viewmodel.fieldanswer.CustomFieldAnswerSelectMultipleRecordingUnitViewModel"
                      required="true"/>
        <cc:attribute name="hasBeenModified" type="Boolean" required="false" default="false"/>
        <cc:attribute name="field" type="fr.siamois.domain.models.form.customfield.CustomFieldSelectMultipleRecordingUnit"
                      required="true"/>
        <cc:attribute name="label" type="String" required="false"/>
        <cc:attribute name="required" type="java.lang.Boolean" required="true"/>
        <cc:attribute name="mode" type="String" required="false" default="READ"/>
        <cc:attribute name="updateTargetsOnBlur" type="String" required="false" default="@this"/>
        <cc:attribute name="multiple" type="Boolean" required="false" default="false"/>
        <cc:attribute name="onModified"
                      method-signature="void setFieldAnswerHasBeenModified(javax.faces.event.AjaxBehaviorEvent)"
                      required="false"/>
        <cc:attribute name="spatialUnitOptions"
                      type="java.util.List"
                      required="true"
                      shortDescription="List of SpatialUnit to display in the dropdown"/>
        <cc:attribute name="displayType" type="java.lang.Boolean" required="false" default="false"/>
        <cc:attribute name="panelId" type="String" required="false"/>
        <cc:attribute name="formCtx" type="fr.siamois.ui.form.EntityFormContext" required="true"/>
    </cc:interface>

    <cc:implementation>
        <p:inplace id="inplace" mode="#{cc.attrs.mode}" toggleable="false">
            <f:facet name="output">
                <!-- Single value -->
                <h:panelGroup rendered="#{(not cc.attrs.multiple) and (not empty cc.attrs.answer.value)}">

                </h:panelGroup>
            </f:facet>
            <f:facet name="input">
                <p:autoComplete value="#{cc.attrs.answer.value}"
                                id="select-multiple-recording-unit"
                                completeMethod="#{cc.attrs.formCtx.completeRecordingUnitOptions}"
                                panelStyleClass="recording-unit"
                                multiple="true"
                                styleClass="recording-unit #{cc.attrs.answer.hasBeenModified ? 'track-change sia-modified-field': 'track-change'}"
                                required="false"
                                var="ru"
                                itemValue="#{ru}"
                                itemLabel="#{ru.fullIdentifier}"
                                onmousedown="event.stopPropagation();"
                                onclick="event.stopPropagation();"
                                converter="#{recordingUnitSummaryConverter}"
                                forceSelection="true"
                                scrollHeight="300"
                                dropdown="true"
                                showEmptyMessage="false"
                                maxResults="#{fieldConfigurationService.resultLimit()}">
                    <f:attribute name="field" value="#{cc.attrs.field}" />
                    <p:ajax update="#{cc.attrs.updateTargetsOnBlur}"
                            process="@this"
                            onstart="$(PrimeFaces.escapeClientId('#{cc.clientId}:input')).removeClass('sia-modified-field'); showSpinner('#{cc.attrs.panelId}')"
                            oncomplete="hideSpinner('#{cc.attrs.panelId}')"
                            onerror="handleAutoSaveError(xhr, status, '#{cc.attrs.panelId}'); $(PrimeFaces.escapeClientId('#{cc.clientId}:input')).addClass('sia-modified-field');"
                            listener="#{cc.attrs.onModified}"/>
                    <f:facet name="footer">

                    </f:facet>
                </p:autoComplete>


            </f:facet>
        </p:inplace>

    </cc:implementation>

</ui:composition>
