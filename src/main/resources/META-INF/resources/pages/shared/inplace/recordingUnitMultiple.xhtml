<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:cc="http://java.sun.com/jsf/composite"
        xmlns:p="http://primefaces.org/ui"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:h="http://java.sun.com/jsf/html">

    <cc:interface>
        <cc:attribute name="answer"
                      type="fr.siamois.ui.viewmodel.fieldanswer.CustomFieldAnswerViewModel"
                      required="true"/>
        <cc:attribute name="hasBeenModified" type="Boolean" required="false" default="false"/>
        <cc:attribute name="field"
                      type="fr.siamois.domain.models.form.customfield.CustomField"
                      required="true"/>
        <cc:attribute name="label" type="String" required="false"/>
        <cc:attribute name="required" type="java.lang.Boolean" required="true"/>
        <cc:attribute name="mode" type="String" required="false" default="READ"/>
        <cc:attribute name="updateTargetsOnBlur" type="String" required="false" default="@this"/>
        <cc:attribute name="multiple" type="Boolean" required="false" default="false"/>
        <cc:attribute name="onModified"
                      method-signature="void setFieldAnswerHasBeenModified(javax.faces.event.AjaxBehaviorEvent)"
                      required="false"/>
        <cc:attribute name="spatialUnitOptions"
                      type="java.util.List"
                      required="true"
                      shortDescription="List of SpatialUnit to display in the dropdown"/>
        <cc:attribute name="displayType" type="java.lang.Boolean" required="false" default="false"/>
        <cc:attribute name="panelId" type="String" required="false"/>
        <cc:attribute name="formCtx" type="fr.siamois.ui.form.EntityFormContext" required="true"/>
        <cc:attribute name="compact" type="java.lang.Boolean" required="false" default="true"
                      shortDescription="true: show max 3 items + expand button, no wrap. false: show all items, wrap enabled."/>
    </cc:interface>

    <cc:implementation>

        <!-- ═══════════════════════════════════════════════════════════
             VIEW MODE
             ═══════════════════════════════════════════════════════════ -->
        <p:outputPanel id="rumView" layout="block" style="display:contents">
        <div id="rum_v_#{cc.clientId.replace(':','_')}" class="rum-wrapper recording-unit #{cc.attrs.mode eq 'input' and empty cc.attrs.answer.value ? 'rum-empty' : ''}">

            <div class="rum-items #{cc.attrs.compact ? 'compact' : ''}" style="#{cc.attrs.compact ? 'flex-wrap:nowrap' : 'flex-wrap:wrap'}">

                <!-- Single value (multiple=false) -->
                <h:panelGroup rendered="#{not cc.attrs.multiple and not empty cc.attrs.answer.value}">
                    <p:commandLink
                            styleClass="rum-chip-link"
                            style="white-space: nowrap;"
                            action="#{flowBean.addRecordingUnitToOverview(
                                cc.attrs.answer.value.id,
                                focusViewBean.mainPanel,
                                null
                            )}"
                            process="@this"
                            update="@this">
                        <f:param name="id" value="#{cc.attrs.answer.value.id}"/>
                        #{cc.attrs.answer.value.fullIdentifier}
                    </p:commandLink>
                </h:panelGroup>

                <!-- Multiple values (multiple=true) -->
                <h:panelGroup rendered="#{cc.attrs.multiple and not empty cc.attrs.answer.value}">
                    <ui:repeat value="#{cc.attrs.answer.value}" var="ru" varStatus="st">
                        <span class="#{cc.attrs.compact and st.index ge 3 ? 'rum-extra' : ''}"
                              style="#{cc.attrs.compact and st.index ge 3 ? 'display:none;' : ''}">
                            <p:commandLink
                                    styleClass="rum-chip-link"
                                    style="white-space: nowrap;"
                                    action="#{flowBean.addRecordingUnitToOverview(
                                        ru.id,
                                        focusViewBean.mainPanel,
                                        null
                                    )}"
                                    process="@this"
                                    update="@none"
                                    onclick="event.stopPropagation();">
                                <f:param name="id" value="#{ru.id}"/>
                                #{ru.fullIdentifier}
                            </p:commandLink>
                        </span>
                    </ui:repeat>
                </h:panelGroup>

            </div>

            <!-- +N / collapse — only in compact mode, always visible -->
            <ui:fragment rendered="#{cc.attrs.compact and cc.attrs.multiple and not empty cc.attrs.answer.value and cc.attrs.answer.value.size() gt 3}">
                <button type="button" class="rum-expand-badge rum-expand-btn"
                        style="background: var(--main-color)"
                        onclick="rumExpand('#{cc.clientId.replace(':','_')}')">
                    +#{cc.attrs.answer.value.size() - 3}
                </button>
                <button type="button" class="rum-action-btn rum-collapse-btn" style="display:none"
                        title="Réduire"
                        onclick="rumCollapse('#{cc.clientId.replace(':','_')}')">
                    <i class="bi bi-chevron-double-left"/>
                </button>
            </ui:fragment>

            <div class="rum-actions">

                <!-- Pencil: enter edit mode (only when editable) -->
                <ui:fragment rendered="#{cc.attrs.mode eq 'input'}">
                    <button type="button" class="rum-action-btn"
                            title="Edit"
                            onclick="rumEdit('#{cc.clientId.replace(':','_')}')">
                        <i class="bi bi-pencil"/>
                    </button>
                </ui:fragment>

                <!-- Side overview — disabled, reserved for future use -->
                <button type="button" class="rum-action-btn" disabled="disabled"
                        title="Aperçu latéral (bientôt disponible)">
                    <i class="bi bi-layout-sidebar-inset-reverse"/>
                </button>

            </div>
        </div>
        </p:outputPanel>

        <!-- ═══════════════════════════════════════════════════════════
             EDIT MODE (hidden by default, shown by rumEdit())
             ═══════════════════════════════════════════════════════════ -->
        <div id="rum_e_#{cc.clientId.replace(':','_')}" class="rum-edit-wrapper" style="display:none">

            <p:autoComplete
                    value="#{cc.attrs.answer.value}"
                    id="select-multiple-recording-unit"
                    widgetVar="#{cc.clientId}_autoComplete"
                    completeMethod="#{cc.attrs.formCtx.completeRecordingUnitOptions}"
                    panelStyleClass="recording-unit"
                    multiple="#{cc.attrs.multiple}"
                    styleClass="recording-unit #{cc.attrs.answer.hasBeenModified ? 'track-change sia-modified-field' : 'track-change'}"
                    required="false"
                    var="ru"
                    itemValue="#{ru}"
                    itemLabel="#{ru.fullIdentifier}"
                    converter="#{recordingUnitSummaryConverter}"
                    forceSelection="true"
                    unique="true"
                    scrollHeight="300"
                    dropdown="false"
                    showEmptyMessage="false"
                    maxResults="10"
                    onmousedown="event.stopPropagation();"
                    onclick="event.stopPropagation();">

                <f:attribute name="field" value="#{cc.attrs.field}"/>

                <p:ajax
                        update="#{cc.attrs.updateTargetsOnBlur}"
                        process="@this"
                        onstart="showSpinner('#{cc.attrs.panelId}');"
                        oncomplete="hideSpinner('#{cc.attrs.panelId}');"
                        onerror="handleAutoSaveError(xhr, status, '#{cc.attrs.panelId}');"
                        listener="#{cc.attrs.onModified}"/>

                <p:ajax
                        event="itemUnselect"
                        update="#{cc.attrs.updateTargetsOnBlur}"
                        process="@this"
                        onstart="showSpinner('#{cc.attrs.panelId}');"
                        oncomplete="hideSpinner('#{cc.attrs.panelId}');"
                        onerror="handleAutoSaveError(xhr, status, '#{cc.attrs.panelId}');"
                        listener="#{cc.attrs.onModified}"/>

                <f:facet name="footer">
                    <div class="ui-fluid" style="padding:0.5rem 1rem 1rem 1rem">
                        <p:commandButton
                                id="btnNouveau"
                                icon="bi bi-plus-lg"
                                process="@this"
                                action="#{cc.attrs.formCtx.initNewRuDefaults(cc.attrs.answer)}"
                                onclick="event.stopPropagation();"
                                oncomplete="PF('#{cc.clientId}_autoComplete').hide(); var ov = PF('#{cc.clientId}_overlay'); ov.show(); ov.align();"
                                value="Nouveau"
                                update="@none"/>
                    </div>
                </f:facet>

            </p:autoComplete>

            <p:overlayPanel for="#{cc.clientId}:select-multiple-recording-unit" my="left top" at="left bottom" showEvent="none"
                            widgetVar="#{cc.clientId}_overlay"
                            dismissable="false"
                            styleClass="new-entity-overlay"
                            autoHide="true"
                            style="max-width: 50rem;"
                            showCloseIcon="true"
                            dynamic="true" id="overlayNouveau" appendTo="#{cc.clientId}"
                            hideEffect="fade">

                <h:panelGrid columns="2" cellpadding="5" id="newGrid">
                    <p:outputLabel for="newRuProjectAutocomplete" value="Projet :"/>
                    <p:autoComplete value="#{cc.attrs.answer.newActionUnit}"
                                    id="newRuProjectAutocomplete"
                                    completeMethod="#{cc.attrs.formCtx.completeActionUnitOptions}"
                                    var="au"
                                    itemValue="#{au}"
                                    itemLabel="#{au.name}"
                                    converter="#{actionUnitSummaryConverter}"
                                    required="true"
                                    forceSelection="true"
                                    scrollHeight="300"
                                    dropdown="true"
                                    placeholder="Rechercher un projet…"
                                    showEmptyMessage="false"
                                    maxResults="#{fieldConfigurationService.resultLimit()}"
                                    onmousedown="event.stopPropagation();"
                                    onclick="event.stopPropagation();">
                        <p:ajax event="itemSelect" process="@this" update="@none"/>
                    </p:autoComplete>

                    <p:outputLabel for="newRuTypeAutocomplete" value="Type :"/>
                    <p:autoComplete value="#{cc.attrs.answer.newType}"
                                    id="newRuTypeAutocomplete"
                                    completeMethod="#{spatialUnitFieldBean.completeWithFieldCode}"
                                    var="autocompleteDto"
                                    itemValue="#{autocompleteDto}"
                                    itemLabel="#{autocompleteDto.conceptLabelToDisplay.label}"
                                    required="true"
                                    onmousedown="event.stopPropagation();"
                                    onclick="event.stopPropagation();"
                                    converter="#{conceptAutocompleteDTOConverter}"
                                    forceSelection="true"
                                    scrollHeight="300"
                                    dropdown="true"
                                    placeholder="#{langBean.msg('common.action.chooseConcept')}"
                                    showEmptyMessage="false"
                                    maxResults="#{fieldConfigurationService.resultLimit()}"
                    >
                        <f:attribute name="fieldCode" value="SIARU.TYPE"/>
                    </p:autoComplete>

                    <p:commandButton
                            style="background: var(--siamois-green-active);
border-color: var(--siamois-green-active);"
                            value="Créer"
                            action="#{cc.attrs.formCtx.saveNewRecordingUnitFromField(cc.attrs.answer)}"
                            process="newGrid"
                            onsuccess="PF('#{cc.clientId}_overlay').hide();"
                            update="select-multiple-recording-unit overlayNouveau templateFormCC:templateForm:templateGrowl @this"
                            resetValues="true"/>

                </h:panelGrid>

            </p:overlayPanel>

            <!-- Close button: exit edit mode and refresh view panel -->
            <button type="button" class="rum-action-btn"
                    title="Fermer"
                    onclick="rumClose('#{cc.clientId.replace(':','_')}'); PrimeFaces.ab({source:'#{cc.clientId}', process:'@none', update:'#{cc.clientId}:rumView'});">
                <i class="bi bi-chevron-double-left"/>
            </button>

            <!-- Side overview — disabled, reserved for future use -->
            <button type="button" class="rum-action-btn" disabled="disabled"
                    title="Aperçu latéral (bientôt disponible)">
                <i class="bi bi-layout-sidebar-inset-reverse"/>
            </button>

        </div>

    </cc:implementation>

</ui:composition>
