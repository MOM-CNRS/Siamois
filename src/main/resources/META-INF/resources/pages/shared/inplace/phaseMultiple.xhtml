<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:cc="http://java.sun.com/jsf/composite"
        xmlns:p="http://primefaces.org/ui"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:h="http://java.sun.com/jsf/html">

    <cc:interface>
        <cc:attribute name="answer"
                      type="fr.siamois.ui.viewmodel.fieldanswer.CustomFieldAnswerSelectMultiplePhaseViewModel"
                      required="true"/>
        <cc:attribute name="hasBeenModified" type="Boolean" required="false" default="false"/>
        <cc:attribute name="field" type="fr.siamois.domain.models.form.customfield.CustomFieldSelectMultiplePhase"
                      required="true"/>
        <cc:attribute name="label" type="String" required="false"/>
        <cc:attribute name="required" type="java.lang.Boolean" required="true"/>
        <cc:attribute name="mode" type="String" required="false" default="READ"/>
        <cc:attribute name="updateTargetsOnBlur" type="String" required="false" default="@this"/>
        <cc:attribute name="multiple" type="Boolean" required="false" default="true"/>
        <cc:attribute name="onModified"
                      method-signature="void setFieldAnswerHasBeenModified(javax.faces.event.AjaxBehaviorEvent)"
                      required="false"/>
        <cc:attribute name="displayType" type="java.lang.Boolean" required="false" default="false"/>
        <cc:attribute name="panelId" type="String" required="false"/>
        <cc:attribute name="formCtx" type="fr.siamois.ui.form.EntityFormContext" required="true"/>
        <cc:attribute name="compact" type="java.lang.Boolean" required="false" default="true"/>
    </cc:interface>

    <cc:implementation>

        <!-- ═══ VIEW MODE ═══ -->
        <p:outputPanel id="phaseView" layout="block" style="display:contents">
        <div id="rum_v_#{cc.clientId.replace(':','_')}" class="rum-wrapper phase">

            <div class="rum-items #{cc.attrs.compact ? 'compact' : ''}" style="#{cc.attrs.compact ? 'flex-wrap:nowrap' : 'flex-wrap:wrap'}">

                <h:panelGroup rendered="#{cc.attrs.multiple and not empty cc.attrs.answer.value}">
                    <ui:repeat value="#{cc.attrs.answer.value}" var="phase" varStatus="st">
                        <span class="#{cc.attrs.compact and st.index ge 3 ? 'rum-extra' : ''}"
                              style="#{cc.attrs.compact and st.index ge 3 ? 'display:none;' : ''}">
                            <p:commandLink
                                    styleClass="rum-chip-link"
                                    style="white-space: nowrap;"
                                    action="#{flowBean.addPhaseToOverview(phase.id, focusViewBean.mainPanel, null)}"
                                    process="@this"
                                    update="@none"
                                    onclick="event.stopPropagation();">
                                <f:param name="id" value="#{phase.id}"/>
                                #{phase.identifier}
                            </p:commandLink>
                        </span>
                    </ui:repeat>
                </h:panelGroup>

            </div>

            <ui:fragment rendered="#{cc.attrs.compact and cc.attrs.multiple and not empty cc.attrs.answer.value and cc.attrs.answer.value.size() gt 3}">
                <button type="button" class="rum-expand-badge rum-expand-btn"
                        style="background: var(--ground-main-color)"
                        onclick="rumExpand('#{cc.clientId.replace(':','_')}')">
                    +#{cc.attrs.answer.value.size() - 3}
                </button>
                <button type="button" class="rum-action-btn rum-collapse-btn" style="display:none"
                        title="Réduire"
                        onclick="rumCollapse('#{cc.clientId.replace(':','_')}')">
                    <i class="bi bi-chevron-double-left"/>
                </button>
            </ui:fragment>

            <div class="rum-actions">
                <ui:fragment rendered="#{cc.attrs.mode eq 'input'}">
                    <button type="button" class="rum-action-btn"
                            title="Modifier"
                            onclick="rumEdit('#{cc.clientId.replace(':','_')}')">
                        <i class="bi bi-pencil"/>
                    </button>
                </ui:fragment>
            </div>
        </div>
        </p:outputPanel>

        <!-- ═══ EDIT MODE ═══ -->
        <div id="rum_e_#{cc.clientId.replace(':','_')}" class="rum-edit-wrapper" style="display:none">

            <p:autoComplete
                    value="#{cc.attrs.answer.value}"
                    id="select-multiple-phase"
                    widgetVar="#{cc.clientId}_autoComplete"
                    completeMethod="#{cc.attrs.formCtx.getPhaseOptions}"
                    panelStyleClass="phase"
                    multiple="#{cc.attrs.multiple}"
                    styleClass="phase #{cc.attrs.answer.hasBeenModified ? 'track-change sia-modified-field' : 'track-change'}"
                    required="false"
                    var="phase"
                    itemValue="#{phase}"
                    itemLabel="#{phase.identifier}"
                    converter="#{phaseConverter}"
                    forceSelection="true"
                    unique="true"
                    scrollHeight="300"
                    dropdown="false"
                    showEmptyMessage="false"
                    maxResults="#{fieldConfigurationService.resultLimit()}"
                    onmousedown="event.stopPropagation();"
                    onclick="event.stopPropagation();">

                <f:attribute name="field" value="#{cc.attrs.field}"/>

                <p:ajax
                        update="#{cc.attrs.updateTargetsOnBlur}"
                        process="@this"
                        onstart="showSpinner('#{cc.attrs.panelId}');"
                        oncomplete="hideSpinner('#{cc.attrs.panelId}');"
                        onerror="handleAutoSaveError(xhr, status, '#{cc.attrs.panelId}');"
                        listener="#{cc.attrs.onModified}"/>

                <p:ajax
                        event="itemUnselect"
                        update="#{cc.attrs.updateTargetsOnBlur}"
                        process="@this"
                        onstart="showSpinner('#{cc.attrs.panelId}');"
                        oncomplete="hideSpinner('#{cc.attrs.panelId}');"
                        onerror="handleAutoSaveError(xhr, status, '#{cc.attrs.panelId}');"
                        listener="#{cc.attrs.onModified}"/>

                <f:facet name="footer">
                    <div class="ui-fluid" style="padding:0.5rem 1rem 1rem 1rem">
                        <p:commandButton
                                id="btnNouveau"
                                icon="bi bi-plus-lg"
                                process="@this"
                                onclick="event.stopPropagation();"
                                oncomplete="PF('#{cc.clientId}_autoComplete').hide(); var ov = PF('#{cc.clientId}_overlay'); ov.show(); ov.align();"
                                value="Nouveau"
                                update="@none"/>
                    </div>
                </f:facet>

            </p:autoComplete>

            <p:overlayPanel for="#{cc.clientId}:select-multiple-phase"
                            my="left top" at="left bottom"
                            showEvent="none"
                            widgetVar="#{cc.clientId}_overlay"
                            dismissable="false"
                            styleClass="new-entity-overlay"
                            autoHide="true"
                            style="max-width: 40rem;"
                            showCloseIcon="true"
                            dynamic="true"
                            id="overlayNouveau"
                            appendTo="#{cc.clientId}"
                            hideEffect="fade">

                <h:panelGrid columns="2" cellpadding="5" id="newGrid">

                    <p:outputLabel for="newPhaseIdentifier" value="Identifiant :"/>
                    <p:inputText value="#{cc.attrs.answer.newIdentifier}"
                                 id="newPhaseIdentifier"
                                 required="true"/>

                    <p:outputLabel for="newPhaseTitleInput" value="Titre :"/>
                    <p:inputText value="#{cc.attrs.answer.newTitle}"
                                 id="newPhaseTitleInput"/>

                    <p:outputLabel for="newPhaseOrderNumber" value="Numéro d'ordre :"/>
                    <p:inputNumber value="#{cc.attrs.answer.newOrderNumber}"
                                   id="newPhaseOrderNumber"
                                   decimalPlaces="0"/>

                    <p:outputLabel for="newPhaseTypeAutocomplete" value="Type :"/>
                    <p:autoComplete value="#{cc.attrs.answer.newType}"
                                    id="newPhaseTypeAutocomplete"
                                    completeMethod="#{spatialUnitFieldBean.completeWithFieldCode}"
                                    var="autocompleteDto"
                                    itemValue="#{autocompleteDto}"
                                    itemLabel="#{autocompleteDto.conceptLabelToDisplay.label}"
                                    required="false"
                                    onmousedown="event.stopPropagation();"
                                    onclick="event.stopPropagation();"
                                    converter="#{conceptAutocompleteDTOConverter}"
                                    forceSelection="true"
                                    scrollHeight="300"
                                    dropdown="true"
                                    placeholder="#{langBean.msg('common.action.chooseConcept')}"
                                    showEmptyMessage="false"
                                    maxResults="#{fieldConfigurationService.resultLimit()}">
                        <f:attribute name="fieldCode" value="SIAPHASE.TYPE"/>
                    </p:autoComplete>

                    <p:commandButton
                            style="background: var(--siamois-green-active); border-color: var(--siamois-green-active);"
                            value="Créer"
                            action="#{cc.attrs.formCtx.saveNewPhaseFromField(cc.attrs.answer)}"
                            process="newGrid"
                            onsuccess="PF('#{cc.clientId}_overlay').hide();"
                            update="select-multiple-phase overlayNouveau templateFormCC:templateForm:templateGrowl @this"
                            resetValues="true"/>

                </h:panelGrid>

            </p:overlayPanel>

            <button type="button" class="rum-action-btn"
                    title="Fermer"
                    onclick="rumClose('#{cc.clientId.replace(':','_')}'); PrimeFaces.ab({source:'#{cc.clientId}', process:'@none', update:'#{cc.clientId}:phaseView'});">
                <i class="bi bi-chevron-double-left"/>
            </button>

        </div>

    </cc:implementation>

</ui:composition>
