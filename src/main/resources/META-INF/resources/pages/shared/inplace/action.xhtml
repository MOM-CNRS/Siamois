<ui:composition
        xmlns="http://www.w3.org/1999/xhtml"
        xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
        xmlns:cc="http://java.sun.com/jsf/composite"
        xmlns:p="http://primefaces.org/ui"
        xmlns:f="http://java.sun.com/jsf/core"
        xmlns:h="http://java.sun.com/jsf/html"
>

    <cc:interface>
        <cc:attribute name="answer" type="fr.siamois.ui.viewmodel.fieldanswer.CustomFieldAnswerSelectOneActionUnitViewModel" required="true"/>
        <cc:attribute name="hasBeenModified" type="Boolean" required="false" default="false"/>
        <cc:attribute name="field" type="fr.siamois.domain.models.form.customfield.CustomFieldSelectOneActionUnit" required="true"/>
        <cc:attribute name="mode" type="String" required="false" default="READ"/>
        <cc:attribute name="updateTargetsOnBlur" type="String" required="false" default="@this"/>
        <cc:attribute name="label" type="String" required="false"/>
        <cc:attribute name="required" type="java.lang.Boolean" required="true"/>
        <cc:attribute name="displayType" type="java.lang.Boolean" required="false" default="false"/>
    </cc:interface>

    <cc:implementation>
        <p:outputPanel id="inplace">
            <div class="rum-wrapper action-unit">
                <div class="rum-items">
                    <h:panelGroup rendered="#{not empty cc.attrs.answer.value}">
                        <p:commandLink
                                styleClass="rum-chip-link"
                                style="white-space: nowrap;"
                                action="#{flowBean.addActionUnitToOverview(
                                    cc.attrs.answer.value.id,
                                    focusViewBean.mainPanel,
                                    null
                                )}"
                                process="@this"
                                update="@none"
                                onclick="event.stopPropagation();">
                            <f:param name="id" value="#{cc.attrs.answer.value.id}"/>
                            #{cc.attrs.answer.value.name}
                        </p:commandLink>
                    </h:panelGroup>
                </div>
            </div>
        </p:outputPanel>
    </cc:implementation>
</ui:composition>
