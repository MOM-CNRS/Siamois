<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:c="http://java.sun.com/jsp/jstl/core" xmlns:f="http://java.sun.com/jsf/core"
             xmlns:h="http://java.sun.com/jsf/html"
>

    <!--@elvariable id="bean" type="fr.siamois.ui.bean.panel.models.panel.single.AbstractSingleEntity"-->
    <!--@elvariable id="customFormPanel" type="fr.siamois.domain.models.form.customform.CustomFormPanelUiDto" -->
    <!--@elvariable id="readOnly" type="java.lang.Boolean" -->
    <!--@elvariable id="prefix" type="String" -->
    <!--@elvariable id="root" type="String" -->
    <!--@elvariable id="updateTargetsOnBlur" type="String" -->
    <!--@elvariable id="statusIndex" type="Object" -->
    <!--@elvariable id="formCtx" type="fr.siamois.ui.form.EntityFormContext" -->


    <p:panelGrid id="customFormPanelGrid-#{statusIndex}-#{prefix}"
                 layout="grid"
    >
        <c:forEach items="#{customFormPanel.rows}" var="row" varStatus="rowStatus">
            <p:row id="row-#{prefix}-#{statusIndex}-#{rowStatus.index}">

                <c:forEach items="#{row.columns}" var="col" varStatus="colStatus">
                    <p:column styleClass="#{col.className}" style="min-width: 250px;"
                              id="col-#{prefix}-#{statusIndex}-#{rowStatus.index}-#{colStatus.index}">
                        <ui:include src="/pages/shared/form/customFormFieldContentForPanel.xhtml">
                            <ui:param name="bean" value="#{bean}"/>
                            <ui:param name="col" value="#{col}"/>
                            <ui:param name="hasBeenModified"
                                      value="#{bean.formResponse.answers.get(col.field).hasBeenModified}"/>
                            <ui:param name="prefix" value="#{prefix}"/>
                            <ui:param name="statusIndex" value="#{statusIndex}"/>
                            <ui:param name="rowIndex" value="#{rowStatus.index}"/>
                            <ui:param name="colIndex" value="#{colStatus.index}"/>
                            <ui:param name="root" value="#{root}"/>
                            <ui:param name="panelIndex" value="#{panelIndex}"/>
                            <ui:param name="answer" value="#{bean.formResponse.answers.get(col.field)}"/>
                            <ui:param name="onModified" value="#{bean.formContext.onFieldAnswerModifiedListener}"/>
                            <ui:param name="panelHeaderUpdateId" value="#{bean.getPanelHeaderUpdateId()}"/>
                            <ui:param name="onGenerateValue" value="#{bean.generateValueForField}"/>
                            <ui:param name="hasAutoGenerationFunction"
                                      value="#{bean.hasAutoGenerationFunction(col.field)}"/>
                        </ui:include>
                    </p:column>
                </c:forEach>
            </p:row>
        </c:forEach>

        <p:row id="row-#{prefix}-#{statusIndex}-newField" rendered="#{customFormPanel.canUserAddFields}">
            <p:column styleClass="ui-g-12 ui-md-6 ui-lg-6" style="min-width: 250px;"
                      id="col-#{prefix}-#{statusIndex}-newFieldRow">

                <p:outputPanel>
                    <p:commandButton value="Ajouter un champ" icon="pi pi-plus"
                                     rendered="#{!bean.formContext.newFieldManager.showEditor}"
                                     actionListener="#{bean.formContext.newFieldManager.prepareNewField(customFormPanel)}"
                                     update="@parent"
                                     styleClass="ui-button"/>

                    <h:panelGroup  styleClass="field-value-group" style=""
                                   rendered="#{bean.formContext.newFieldManager.showEditor}" id="editorPanel" >
                        <div>
                            <p:outputLabel
                                    for="#{cc.attrs.forId}"
                                    indicateRequired="auto"
                                    style="color: var(--text-light)"
                                    value="Nouveau champ"/>
                            <h:graphicImage rendered="#{cc.attrs.isTheso}"
                                            library="img"
                                            name="icon_opentheso2.png"
                                            styleClass="label-icon"
                                            alt="Opentheso Icon"/>
                        </div>
                        <div style="display:flex;
                flex-direction: column; gap:0.5em; border-radius: 10px;border:1px dashed oklch(70.7% 0.022 261.325);
                padding: 1rem; width: fit-content;">
                            <div  style="display:flex;gap: 0.5em">

                                <div >
                                    <p:outputLabel for="fieldType" value="Type de champ" style="color:var(--text-light);display:block;"  />
                                    <p:selectOneMenu id="fieldType"  style="width:100%"
                                                     disabled="true">
                                        <f:selectItem itemLabel="Mesure" itemValue="STRING"/>
                                    </p:selectOneMenu>
                                </div>

                                <div >
                                    <p:outputLabel for="fieldConcept"  value="Type de mesure"
                                                   style="display:block;color:var(--text-light);"/>
                                    <p:autoComplete id="fieldConcept"
                                                    value="Longueur"
                                                    var="c" itemLabel="#{c}" itemValue="#{c}"
                                                    forceSelection="true"
                                                    style="width:100%" inputStyle="width:100%"/>
                                </div>

                                <div >
                                    <p:outputLabel for="fieldNature"  value="Nature de la mesure"
                                                   style="display:block;color:var(--text-light);"/>
                                    <p:autoComplete id="fieldNature"
                                                    value="Maximum"
                                                    var="c" itemLabel="#{c}" itemValue="#{c}"
                                                    forceSelection="true"
                                                    style="width:100%" inputStyle="width:100%"/>
                                </div>

                                <div >
                                    <p:outputLabel for="fieldUnit" value="Unité" style="color:var(--text-light);display:block;"  />
                                    <p:selectOneMenu id="fieldUnit"  style="width:100%">
                                        <f:selectItem itemLabel="m" itemValue="m"/>
                                    </p:selectOneMenu>
                                </div>
                            </div>


                            <div style="display:flex; align-items:flex-end; gap:5px;">
                                <p:commandButton icon="pi pi-check" actionListener="#{bean.formContext.newFieldManager.saveNewField}"
                                                 value="Ajouter le champ"
                                                 update="@form" />
                                <p:commandButton icon="pi pi-times" actionListener="#{customFormPanel.cancelNewField}"
                                                 update="@parent" styleClass="ui-button-flat ui-button-plain ui-button-danger"/>
                            </div>
                        </div>
                    </h:panelGroup>
                </p:outputPanel>

            </p:column>
        </p:row>
    </p:panelGrid>

    <ui:fragment rendered="#{empty customFormPanel.rows}">
        <i>Aucun champ</i>
    </ui:fragment>

</ui:fragment>
