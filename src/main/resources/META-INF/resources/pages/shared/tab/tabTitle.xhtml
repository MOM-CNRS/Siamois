<ui:fragment xmlns="http://www.w3.org/1999/xhtml"
             xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
             xmlns:p="http://primefaces.org/ui"
             xmlns:h="http://java.sun.com/jsf/html"

>

   <!--@elvariable id="title" type="String"-->
   <!--@elvariable id="icon" type="String"-->
   <!--@elvariable id="emptyTab" type="Boolean"-->
   <!--@elvariable id="validated" type="Boolean"-->


      <div style="display:flex; gap:0.2em;align-items: center;font-weight: bold;">
         <i class="#{icon}"/>
         <h:outputText value="#{title}"/>
         <h:panelGroup rendered="#{count ne null}">
            <h:outputText value=" (#{count})"/>
         </h:panelGroup>
      </div>


</ui:fragment>
